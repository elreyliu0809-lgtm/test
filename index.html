<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>灰盒 v1.2 · 六边形翻地·自由合成·扇形塔防</title>
<script src="https://cdn.jsdelivr.net/npm/pixi.js-legacy@7.3.2/dist/pixi-legacy.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0e1418; color:#e8eef2; font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  overflow:hidden; height:100%; }
body { display:flex; flex-direction:column; align-items:center; }

#tune { width:100%; background:#0a0f12ee; border-bottom:1px solid #1d2a32; padding:5px 10px;
  display:flex; gap:10px; align-items:center; flex-wrap:wrap; font-size:11px; color:#8fa6b2; z-index:10; }
#tune b { color:#cfe; } #tune label { display:flex; align-items:center; gap:3px; }
#tune input { width:36px; background:#16242c; border:1px solid #283a44; color:#e8eef2; border-radius:3px; padding:2px 3px; font-size:11px; text-align:center; }
#tune button { background:#1f6feb; color:#fff; border:none; border-radius:4px; padding:3px 8px; cursor:pointer; font-size:11px; }

#gameArea { flex:1; width:100%; max-width:480px; position:relative; }
#stage { width:100%; height:100%; display:block; }

#hud { position:absolute; top:0; left:0; right:0; padding:8px 12px; display:flex; justify-content:flex-end; align-items:flex-start; pointer-events:none; z-index:5; }
.hud-card { background:#0a0f12dd; border:1px solid #1f2c34; border-radius:8px; padding:6px 10px; pointer-events:auto; }
.hud-val { font-size:20px; font-weight:800; line-height:1; }
.hud-val.gold { color:#ffd24a; } .hud-val.red { color:#ff5a5a; } .hud-val.blue { color:#4a9eff; }
.hud-lbl { font-size:10px; color:#6f8593; }
.hud-bar { height:6px; border-radius:3px; background:#1c2a33; margin-top:3px; min-width:60px; }
.hud-bar-fill { height:100%; border-radius:3px; transition:width .3s; }

#mergeHint { position:absolute; top:60px; left:50%; transform:translateX(-50%); background:#ffd24a;
  color:#0e1418; padding:6px 16px; border-radius:20px; font-size:13px; font-weight:700;
  pointer-events:auto; cursor:pointer; display:none; z-index:5; box-shadow:0 4px 12px #0004; }

#gameOverlay { position:absolute; inset:0; background:#0008; display:none; justify-content:center; align-items:center; z-index:20; }
#gameOverlay .go-text { color:#ff3333; font-size:36px; font-weight:800; text-shadow:0 3px 12px #000; }
#gameOverlay button { margin-top:16px; background:#1f6feb; color:#fff; border:none; border-radius:8px; padding:10px 24px; font-size:16px; cursor:pointer; }

/* 选择面板 */
#pickOverlay { position:absolute; inset:0; background:#000a; display:none; justify-content:center; align-items:center; z-index:25; flex-direction:column; }
#pickTitle { color:#ffd24a; font-size:18px; font-weight:800; margin-bottom:12px; text-shadow:0 2px 8px #000; }
#pickOptions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; padding:0 16px; }
.pick-card { background:#16242c; border:2px solid #2c3f4b; border-radius:12px; padding:12px 14px; min-width:120px;
  cursor:pointer; text-align:center; transition:all .15s; }
.pick-card:hover { border-color:#ffd24a; transform:scale(1.06); }
.pick-icon { font-size:24px; margin-bottom:4px; }
.pick-name { font-size:15px; font-weight:700; color:#e8eef2; }
.pick-desc { font-size:11px; color:#8fa6b2; margin-top:3px; }

/* 战前选将 */
#draftOverlay { position:absolute; inset:0; background:#0e1418f0; display:none; flex-direction:column;
  justify-content:center; align-items:center; z-index:30; padding:16px; overflow-y:auto; }
#draftTitle { color:#ffd24a; font-size:22px; font-weight:800; margin-bottom:4px; }
#draftDesc { color:#8fa6b2; font-size:12px; margin-bottom:16px; }
#draftGrid { display:flex; flex-direction:column; gap:12px; width:100%; max-width:420px; }
.draft-row { display:flex; flex-direction:column; gap:6px; }
.draft-row-title { font-size:12px; color:#6f8593; font-weight:700; padding-left:4px; }
.draft-row-cards { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
.draft-card { background:#16242c; border:2px solid #2c3f4b; border-radius:10px; padding:6px 8px;
  min-width:56px; max-width:80px; cursor:pointer; text-align:center; transition:all .15s; position:relative; }
.draft-card:hover { border-color:#4a9eff; transform:scale(1.04); }
.draft-card.selected { border-color:#ffd24a; background:#1f2e1a; box-shadow:0 0 12px #ffd24a44; }
.draft-card .pick-icon { font-size:18px; }
.draft-card .pick-name { font-size:13px; }
.draft-card .pick-desc { font-size:10px; }
.recommend-badge { position:absolute; top:-1px; right:-1px; background:#ffd24a; color:#000; font-size:7px; font-weight:800; padding:1px 4px; border-radius:0 10px 0 6px; line-height:1.8; pointer-events:none; }
#draftStart { margin-top:16px; background:#1f6feb; color:#fff; border:none; border-radius:8px;
  padding:12px 32px; font-size:16px; font-weight:700; cursor:pointer; transition:all .15s; }
#draftStart:hover { background:#3a8aff; transform:scale(1.05); }
#draftStart:disabled { background:#333; color:#666; cursor:not-allowed; transform:none; }

#winOverlay { position:absolute; inset:0; background:#0008; display:none; justify-content:center; align-items:center; z-index:20; }
#winOverlay .win-text { color:#ffd24a; font-size:32px; font-weight:800; text-shadow:0 3px 12px #000; }
#winOverlay .win-sub { color:#8fa6b2; font-size:14px; margin:8px 0 16px; }
.win-stats { background:#0a1418; border:1px solid #1f3040; border-radius:10px; padding:10px 14px; margin:0 0 14px; text-align:left; min-width:220px; }
.ws-title { color:#ffd24a; font-size:12px; font-weight:800; margin-bottom:8px; text-align:center; }
.ws-row { display:flex; justify-content:space-between; align-items:center; padding:3px 0; border-bottom:1px solid #1a2830; }
.ws-row:last-child { border-bottom:none; }
.ws-name { color:#e0e8ec; font-size:12px; font-weight:700; margin-right:8px; }
.ws-nums { color:#8fa6b2; font-size:11px; white-space:nowrap; }
.ws-pct { color:#4affff; font-weight:700; }
#guideHint { position:absolute; top:52px; left:50%; transform:translateX(-50%); background:#4affff18; border:1px solid #4affff66; color:#4affff; padding:6px 16px; border-radius:20px; font-size:12px; font-weight:700; pointer-events:none; display:none; z-index:5; white-space:nowrap; }

#hpHud { width:100%; max-width:480px; background:#0a0f12f0; border-top:2px solid #1f2c34; padding:7px 14px 10px; padding-bottom: max(10px, calc(env(safe-area-inset-bottom, 0px) + 10px)); display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
.bhud-row { display:flex; align-items:center; gap:8px; }
#hpHud .hp-lbl { font-size:11px; color:#8fa6b2; white-space:nowrap; }
#hpHud .hp-val { font-size:18px; font-weight:800; color:#ff5a5a; white-space:nowrap; line-height:1; min-width:40px; }
#hpHud .hp-track { flex:1; height:12px; border-radius:6px; background:#1c2a33; overflow:hidden; }
#hpHud .hp-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#cc2222,#ff5a5a); transition:width .3s; }
#hpHud .hp-max { font-size:11px; color:#6f8593; white-space:nowrap; }
/* 底部进度行 */
.bp-sep { width:1px; height:20px; background:#1f2c34; flex-shrink:0; }
.bp-lvl-lbl { font-size:10px; color:#6f8593; white-space:nowrap; }
.bp-lvl-val { font-size:15px; font-weight:800; color:#ffd24a; line-height:1; }
.bp-bar { width:52px; height:5px; border-radius:3px; background:#1c2a33; overflow:hidden; flex-shrink:0; }
.bp-bar-fill { height:100%; border-radius:3px; background:#ffd24a; transition:width .3s; }
.bp-hint { flex:1; font-size:10px; color:#ffd24a88; white-space:nowrap; }
.bp-pow-lbl { font-size:10px; color:#6f8593; }
.bp-pow-val { font-size:12px; font-weight:700; color:#4a9eff; }
.bp-sum-lbl { font-size:10px; color:#6f8593; }
.bp-sum-val { font-size:15px; font-weight:800; color:#ffd24a; line-height:1; }
.bp-sum-sub { font-size:10px; color:#6f8593; }
/* 强化槽位栏（右侧纵列） */
#buffBar { position:absolute; right:4px; top:90px; display:flex; flex-direction:column; gap:6px; z-index:6; }
.buff-chip { background:#0e1e28cc; border:1px solid #2c4454; border-radius:6px; padding:4px 7px; font-size:12px; color:#b8d4e2; white-space:nowrap; display:flex; align-items:center; gap:3px; cursor:pointer; }
.buff-chip:hover { border-color:#5a9dc5; background:#1a3040cc; }
.buff-chip .bc-icon { font-size:14px; }
.buff-chip .bc-count { font-size:11px; color:#8fc8e0; }
#buffDetail { display:none; position:absolute; right:76px; top:90px; background:#0e1e28ee; border:1px solid #3a6070; border-radius:8px; padding:8px 10px; z-index:7; min-width:130px; }
#buffDetail .bd-title { font-size:13px; color:#5ac8fa; font-weight:bold; margin-bottom:5px; }
#buffDetail .bd-item { font-size:11px; color:#b8d4e2; padding:2px 0; border-bottom:1px solid #1e3040; }
#buffDetail .bd-item:last-of-type { border-bottom:none; }
#buffDetail .bd-close { font-size:10px; color:#5a8a9a; cursor:pointer; text-align:right; margin-top:4px; }
</style>
</head>
<body>

<div id="tune">
  <b>TUNE v1.2</b>
  <label>合成阶数<input id="t_maxLvl" type="number" value="4"></label>
  <label>每次解锁<input id="t_unlock" type="number" value="4"></label>
  <label>波次ms<input id="t_waveMs" type="number" value="8000" style="width:44px"></label>
  <label>敌速<input id="t_enemySpd" type="number" value="0.4" style="width:36px"></label>
  <label>翻CD<input id="t_flipCd" type="number" value="800" style="width:44px"></label>
  <label>免CD次数<input id="t_freeFlips" type="number" value="0" style="width:30px"></label>
  <label>金币倍率<input id="t_goldMul" type="number" value="1.0" style="width:36px"></label>
  <button id="t_apply">重开</button>
  <span id="t_note" style="color:#5f7480"></span>
</div>

<div id="gameArea">
  <canvas id="stage"></canvas>
  <div id="hud">
    <div class="hud-card">
      <div class="hud-lbl">波次</div>
      <div class="hud-val blue" id="waveCountEl">0/15</div>
      <div class="hud-lbl">下一波 <span id="waveTimerEl">5s</span></div>
    </div>
  </div>
  <div id="mergeHint">选择合成目标（点同种同级建筑）· 点此取消</div>
  <div id="pickOverlay"><div id="pickTitle"></div><div id="pickOptions"></div></div>
  <div id="draftOverlay">
    <div id="draftTitle">选择武将阵容</div>
    <div id="draftDesc">进攻2位 + 防守2位，共4将出征</div>
    <div id="draftGrid"></div>
    <button id="draftStart">开始战斗</button>
  </div>
  <div id="gameOverlay"><div style="text-align:center"><div class="go-text">基地陷落</div><button id="btnRestart2">重开</button></div></div>
  <div id="winOverlay"><div style="text-align:center"><div class="win-text">🎉 通关！</div><div class="win-sub">撑过 15 波，大获全胜 · 难度 <span id="difficultyEl">1</span></div><div id="winStats" class="win-stats"></div><div style="display:flex;gap:10px;justify-content:center"><button id="btnRestart3" style="background:#1f6feb;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:16px;cursor:pointer;">再战一局</button><button id="btnNextDiff" style="background:#2ea043;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:16px;cursor:pointer;">下一难度</button></div></div></div>
  <div id="guideHint"></div>
  <!-- 强化槽位（右侧纵列，最多5个：4将+少年） -->
  <div id="buffBar"></div>
  <div id="buffDetail"></div>
</div>

<div id="hpHud">
  <div class="bhud-row">
    <div class="hp-lbl">城墙</div>
    <div class="hp-val" id="hpEl">500</div>
    <div class="hp-track"><div class="hp-fill" id="hpBar" style="width:100%"></div></div>
    <div class="hp-max" id="hpMaxEl">/ 500</div>
  </div>
  <div class="bhud-row">
    <div class="bp-lvl-lbl">基地 Lv</div>
    <div class="bp-lvl-val" id="baseLvlEl">1</div>
    <div class="bp-bar"><div class="bp-bar-fill" id="lvlBar" style="width:0%"></div></div>
    <div class="bp-hint" id="lvlHintEl">还需4次升级</div>
    <div class="bp-sep"></div>
    <div class="bp-pow-lbl">金币</div>
    <div class="bp-pow-val" id="goldHudEl">0</div>
    <div class="bp-sep"></div>
    <div class="bp-sum-lbl">召唤</div>
    <div class="bp-sum-val" id="summonEl">0</div>
    <div class="bp-sum-sub">次 · 下次<span id="summonCostEl">¥10</span> · 余<span id="flipsEl">0</span>格</div>
  </div>
  <!-- 强化槽位已移至 gameArea 右侧纵列 -->
</div>

<script>
/* ============================================================
   灰盒 v1.2 — 基地在底部·只能向上扩·格子耗尽升级·指数数值压力·武将炸裂特效
   ============================================================ */

// ===== TUNE =====
const TUNE = {
  maxRings: 3,
  maxLvl: 4,
  waveMs: 8000,
  enemySpd: 0.4,
  baseHP: 500,
  unlockCount: 4,
  flipCdMs: 800,   // 仅防误触（P4：金币取代CD作为节流机制）
  initFreeFlips: 0, // 已废弃，初始100G本身覆盖前3次翻格
  goldMul: 1.0,  // 金币掉落全局倍率（playtest 调参用）
};

// 每击杀金币掉落：Math.round(waveCount * GOLD_PER_KILL[waveType] * TUNE.goldMul)
const GOLD_PER_KILL = { normal:6, swarm:3, elite:50, speed:5 };

// 翻牌累计达到这些次数时基地升级并解锁地格（单局约5次，对标蔚蓝的低频升级）
// 升级与"铺满地块"解耦——合成只为战力服务，不再左右升级节奏
// 首阈值=开局可翻格数(4)，保证首次升级无需合成即可达成，避免开局4格全异将时锁死
const UPGRADE_FLIPS = [4, 9, 15, 22, 30];

// 召唤(翻格)价格阶梯——对标蔚蓝。本步只用于HUD展示与节奏参考(单局约33次≈战斗结束)，
// 暂不扣金币/不加收入/不锁死；真实金币经济(怪物波次掉落)留待下一步设计。
const FLIP_PRICES = [10,20,30,45,60,80,90,110,130,150,160,175,190,200,215,235,260,290,320,350,380,420,455,485,515,545,575,605,620,630,640,650,660,660];
const START_GOLD = 100;

// ===== 建筑（进攻=出兵，防守=站桩远程） =====
const B_TYPES = [
  { key:'advance', name:'进攻', hex:0xff5a5a, css:'#ff5a5a', glyph:'⚔', range:2.0, dps:6, troopSpd:0.33 },
  { key:'defense', name:'防守', hex:0x4a9eff, css:'#4a9eff', glyph:'◈', range:2.4, dps:4 },
];

// ===== 武将池（进攻：产亲兵出征；防守：站桩远程输出） =====
const GENERALS = {
  advance: [
    { key:'guanyu',   name:'关羽',  category:'advance', glyph:'⚔关', desc:'统帅千军',  dpsMul:5.0, rangeMul:1.2, spdMul:1.0, projSize:6 },
    { key:'zhangfei', name:'张飞',  category:'advance', glyph:'⚔张', desc:'亲兵爆裂',  dpsMul:3.5, rangeMul:0.9, spdMul:0.8, projSize:8, aoe:true },
    { key:'zhaoyun',  name:'赵云',  category:'advance', glyph:'⚔赵', desc:'龙骑突击',  dpsMul:3.5, rangeMul:1.0, spdMul:2.0, projSize:4 },
    { key:'ganning',  name:'甘宁',  category:'advance', glyph:'⚔甘', desc:'三路突袭',  dpsMul:2.0, rangeMul:1.3, spdMul:1.0, projSize:3, multishot:3, disabled:true },
    { key:'caoren',   name:'曹仁',  category:'advance', glyph:'⚔曹', desc:'嘲讽反伤',  dpsMul:1.5, rangeMul:2.0, spdMul:1.0, projSize:4, taunt:true, reflect:0.3 },
    { key:'dianwei',  name:'典韦',  category:'advance', glyph:'⚔典', desc:'灼烧光环',  dpsMul:3.0, rangeMul:1.0, spdMul:1.2, projSize:5, burnAura:true },
    { key:'lubu',     name:'吕布',  category:'advance', glyph:'⚔布', desc:'铁骑冲阵',  dpsMul:4.0, rangeMul:1.5, spdMul:2.2, projSize:7, charge:true },
  ],
  defense: [
    { key:'huangzhong', name:'黄忠',  category:'defense', glyph:'◈黄', desc:'极远狙击',  dpsMul:4.0, rangeMul:2.2, spdMul:0.6, projSize:5 },
    { key:'zhugeliang', name:'诸葛亮',category:'defense', glyph:'◈诸', desc:'减速中毒',  dpsMul:3.5, rangeMul:1.5, spdMul:1.0, projSize:6, slow:0.5 },
    { key:'zhouyu',     name:'周瑜',  category:'defense', glyph:'◈周', desc:'连锁火焰',  dpsMul:5.5, rangeMul:1.2, spdMul:0.9, projSize:5, chain:4, chainDecay:0.75 },
    { key:'simayi',     name:'司马懿',category:'defense', glyph:'◈司', desc:'天命雷暴',  dpsMul:4.0, rangeMul:1.0, spdMul:1.0, projSize:5, storm:true },
    { key:'taishici',   name:'太史慈',category:'defense', glyph:'◈太', desc:'穿透急射',  dpsMul:3.0, rangeMul:1.5, spdMul:1.8, projSize:4 },
    { key:'pangtong',   name:'庞统',  category:'defense', glyph:'◈庞', desc:'连环雷击',  dpsMul:3.0, rangeMul:1.0, spdMul:0.85, projSize:5, chain:4, chainDecay:0.8, chainFarthest:true, chainColor:0x66ccff },
    { key:'xuchu',      name:'许褚',  category:'defense', glyph:'◈许', desc:'击晕控制',  dpsMul:2.5, rangeMul:1.2, spdMul:0.8, projSize:5, stun:0.3, disabled:true },
  ],
};

// ===== 通用词条（保底） =====
const BUFF_POOL_COMMON = [
  { key:'heal',  name:'城墙修复', desc:'城墙回血30',    icon:'♥', apply: g=>{ baseHP=Math.min(maxHP, baseHP+30); }},
  { key:'maxHp', name:'坚城厚壁', desc:'HP上限+40',     icon:'🛡', apply: g=>{ maxHP+=40; baseHP+=40; }},
];

// ===== 少年（主基地英雄）强化词条 =====
let shaoNianAtk = null; // 在startGame初始化：{ timer, targets, dmgMul, rangeMul, spdMul }
const SHAONIAN_UPGRADES = [
  { key:'sn_targets', name:'少年·纵横', desc:'主基地攻击同时打+1目标（最多3个）', icon:'⚔',
    apply: ()=>{ if(shaoNianAtk) shaoNianAtk.targets = Math.min(3, shaoNianAtk.targets+1); }},
  { key:'sn_dmg',    name:'少年·锋芒', desc:'主基地攻击伤害×1.5', icon:'💥',
    apply: ()=>{ if(shaoNianAtk) shaoNianAtk.dmgMul *= 1.5; }},
  { key:'sn_range',  name:'少年·远望', desc:'主基地攻击范围+40%', icon:'👁',
    apply: ()=>{ if(shaoNianAtk) shaoNianAtk.rangeMul *= 1.4; }},
  { key:'sn_speed',  name:'少年·急袭', desc:'主基地攻击间隔缩短40%', icon:'⚡',
    apply: ()=>{ if(shaoNianAtk) shaoNianAtk.spdMul *= 0.6; }},
  { key:'sn_wallregen', name:'少年·城墙修复', desc:'每5秒回复10点城墙生命', icon:'🏯',
    apply: ()=>{ globalBuffs.wallRegen_shaonian = true; }},
];

// ===== 武将专属词条 =====
// apply(g) 写全局buff；applyCell(cell,g) 写格子级属性（升级时遍历所有同将格）
const GENERAL_UPGRADES = {
  // ── 进攻将 ──
  guanyu: [
    { key:'guanyu_a', name:'关羽·义绝', desc:'青龙斩穿透延长至5格（+2格）', icon:'⚔',
      apply: g=>{ g.troopSplash_guanyu=true; }},
    { key:'guanyu_b', name:'关羽·武圣', desc:'每次产兵时激励全军，8秒内每批次产兵全体亲兵伤害+8%（最多3层+24%）', icon:'👑',

// ===== 六边形工具（flat-top 平顶，上下边水平，紧密排列） =====
const HEX_SIZE = 32;
const HEX_COL = 1.5 * HEX_SIZE;          // 平顶：列间距（水平）
const HEX_ROW = Math.sqrt(3) * HEX_SIZE; // 平顶：行间距（垂直）
const RANGED_RANGE_CAP = HEX_ROW * 9;    // 远程有效射程上限（Bug-5 fix: 从8扩为9），防一杆覆盖全场（B案，可调）

function hexToPixel(q, r, cx, cy) {
  return { x: HEX_COL * q + cx, y: HEX_ROW * (r + q*0.5) + cy };
}

// 像素坐标 → 所在六边形单元格中心（flat-top 立方取整）。cx/cy 为运行时全局基地中心。
const HEX_DIRS = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]]; // flat-top 六邻居（axial）
function pixelToAxial(px, py) {
  const q = (px - cx) / HEX_COL;
  const r = (py - cy) / HEX_ROW - q * 0.5;
  let s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
  if (dq > dr && dq > ds) rq = -rr - rs;
  else if (dr > ds) rr = -rq - rs;
  return { q: rq, r: rr };
}
function pixelToHexCenter(px, py) {
  const a = pixelToAxial(px, py);
  return hexToPixel(a.q, a.r, cx, cy);
}
// 两个像素点是否落在同一六边形单元格内
function sameHexCell(ax, ay, bx, by) {
  const a = pixelToAxial(ax, ay), b = pixelToAxial(bx, by);
  return a.q === b.q && a.r === b.r;
}
// 该格是否可走：汇聚线以上仅三路列(q=-3/0/3)，汇聚线以下全可走
function laneWalkable(q, r) {
  const p = hexToPixel(q, r, cx, cy);
  if (p.y >= LANE_MERGE_Y) return true;
  return q === -3 || q === 0 || q === 3;
}
// 朝 (gx,gy) 前进的下一格中心：贪心选最朝目标方向的可走邻居；接近目标则直接给目标
function nextStepCenter(px, py, gx, gy) {
  const goalDx = gx - px, goalDy = gy - py;
  const gl = Math.hypot(goalDx, goalDy);
  if (gl <= HEX_SIZE * 1.1) return { x: gx, y: gy };
  const cur = pixelToAxial(px, py);
  let best = null, bestScore = -Infinity;
  for (const [dq, dr] of HEX_DIRS) {
    const np = hexToPixel(cur.q + dq, cur.r + dr, cx, cy);
    if (!laneWalkable(cur.q + dq, cur.r + dr)) continue;
    const ndx = np.x - px, ndy = np.y - py, nl = Math.hypot(ndx, ndy) || 1;
    const score = (ndx * goalDx + ndy * goalDy) / (nl * gl);
    if (score > bestScore) { bestScore = score; best = np; }
  }
  return best || { x: gx, y: gy };
}
// 两像素点之间的六边形格距离（轴向立方距离）
function hexDistance(ax, ay, bx, by) {
  const a = pixelToAxial(ax, ay), b = pixelToAxial(bx, by);
  return (Math.abs(a.q - b.q) + Math.abs(a.q + a.r - b.q - b.r) + Math.abs(a.r - b.r)) / 2;
}

// 返回平顶六边形的顶点数组（供 drawPolygon 使用）
function hexPoly(hx, hy, r) {
  const pts = [];
  for(let i=0;i<6;i++){ const a=Math.PI/3*i; pts.push(hx+r*Math.cos(a), hy+r*Math.sin(a)); }
  return pts;
}

// 铺满全屏的背景六边形地板（纯视觉，覆盖范围含左右滚动余量）
function buildBgHexGrid() {
  bgHexC.removeChildren();
  const g = new PIXI.Graphics();
  const qMin = Math.floor(-cx / HEX_COL) - 1;
  const qMax = Math.ceil((W - cx) / HEX_COL) + 1;
  const rMin = Math.floor((-cy - HEX_SIZE) / HEX_ROW) - 1;
  const rMax = Math.ceil((H - cy + HEX_SIZE) / HEX_ROW) + 1;
  for(let q=qMin; q<=qMax; q++) {
    for(let r=rMin; r<=rMax; r++) {
      const px = cx + q * HEX_COL;
      const py = cy + HEX_ROW * (r + q * 0.5);
      g.lineStyle(1, 0x1e3848, 0.7);
      g.beginFill(0x0c1a24, 0.95);
      g.drawPolygon(hexPoly(px, py, HEX_SIZE - 1));
      g.endFill();
    }
  }
  bgHexC.addChild(g);
}

function hexRing(radius) {
  if (radius === 0) return [{ q:0, r:0 }];
  const results = [];
  for (let dq = -radius; dq <= radius; dq++) {
    for (let dr = Math.max(-radius, -dq-radius); dr <= Math.min(radius, -dq+radius); dr++) {
      const ds = -dq - dr;
      if (Math.max(Math.abs(dq), Math.abs(dr), Math.abs(ds)) === radius)
        results.push({ q:dq, r:dr });
    }
  }
  return results;
}

function hexCorners(size) {
  const c = [];
  for (let i=0; i<6; i++) {
    const angle = Math.PI/180 * (60*i);
    c.push(size*Math.cos(angle), size*Math.sin(angle));
  }
  return c;
}

// ===== 音效 =====
let audioCtx = null;
function ensureAudio(){ if(!audioCtx) try{ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function blip(freq,dur=0.08,type='triangle',vol=0.14){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function burstSound(n){ for(let i=0;i<Math.min(n,5);i++) setTimeout(()=>blip(380+i*70,0.1,'sawtooth',0.12),i*40); }

  // 三路几何：路中心 = 左/中/右，分割带在路与路之间，汇聚线在领地前端之上
  const laneSpread = HEX_COL * 3; // 左/右路中心在q=±3
  LANES = [cx - laneSpread, cx, cx + laneSpread];
  LANE_BOUNDS = [cx - HEX_COL*2, cx + HEX_COL*2]; // 障碍列q=±2，与drawLanes保持一致

  buildBgHexGrid(); // 铺全屏背景六边形

function showDraft(){
  const overlay = document.getElementById('draftOverlay');
  const grid = document.getElementById('draftGrid');
  const btn = document.getElementById('draftStart');
  grid.innerHTML = ''; draftPicks = [];

  const catNames = { advance:'进攻将 ⚔ — 产亲兵出征', defense:'防守将 ◈ — 站桩远程输出' };
  const updateBtn = () => {
    btn.disabled = draftPicks.length !== 4;
    btn.textContent = `已选 ${draftPicks.length}/4 ▶ 开始战斗`;
  };

  for(const [catKey, generals] of Object.entries(GENERALS)){
    const row = document.createElement('div');
    row.className = 'draft-row';
    const title = document.createElement('div');
    title.className = 'draft-row-title';
    title.textContent = catNames[catKey] || catKey;
    row.appendChild(title);
    const cards = document.createElement('div');
    cards.className = 'draft-row-cards';
    generals.filter(gen => !gen.disabled).forEach(gen => {
      const card = document.createElement('div');
      card.className = 'draft-card';
      const RECOMMENDED = new Set(['guanyu','lubu','zhangfei','zhugeliang','simayi','pangtong']);
      const recBadge = RECOMMENDED.has(gen.key) ? '<div class="recommend-badge">推荐</div>' : '';
      card.innerHTML = `${recBadge}<div class="pick-icon">${gen.glyph}</div><div class="pick-name">${gen.name}</div><div class="pick-desc">${gen.desc}</div>`;
      card.onclick = () => {
        const idx = draftPicks.findIndex(g=>g.key===gen.key);
        if(idx >= 0){
          draftPicks.splice(idx, 1);
          card.classList.remove('selected');
        } else if(draftPicks.length < 4){
          draftPicks.push(gen);
          card.classList.add('selected');
        }
        updateBtn();
      };
      cards.appendChild(card);
    });
    row.appendChild(cards);
    grid.appendChild(row);
  }

  updateBtn();
  btn.onclick = () => { overlay.style.display='none'; beginCombat(); };
  overlay.style.display = 'flex';
}

function beginCombat(){
  inDraft = false; waveTimer = TUNE.waveMs; // 立即触发第一波
  battleStartTime = performance.now();
  buildHexGrid();
  updateHUD();
  setNote(`已选：${draftPicks.map(g=>g.name).join('·')} | 翻牌${UPGRADE_FLIPS.length}次升级·逐步解锁全地格`);
  if(isFirstGame){
    isFirstGame=false;
    guideStep=0;
    showGuideHint('☝ 点击 ? 格翻牌，建造武将');
  }
}

// ===== 建造六边形网格（平顶·显式16格：base + 6初始圈 + 9升级解锁） =====
const RING1_CELLS = [[0,-1],[1,-1],[1,0],[0,1],[-1,1],[-1,0]];
const RING2_CELLS = [[2,0],[-2,2],[2,-1],[-2,1],[2,-2],[-2,0],[1,-2],[-1,-1],[0,-2]];
function hexDist(q,r){ return Math.max(Math.abs(q), Math.abs(r), Math.abs(q+r)); }

function buildHexGrid(){
  drawLanes();
  const pushCell = (q,r,state)=> hexCells.push({ q, r, ring:hexDist(q,r), state, building:null, category:null, lvl:0, general:null, generalOut:false, generalRespawnTimer:0, timerArc:null, timerText:null, guidePulse:null, cdArc:null, stormGfx:null, _stormTimer:0 });
  pushCell(0, 0, 'base');
  for(const [q,r] of RING1_CELLS) pushCell(q, r, 'flippable'); // 开局可翻一圈
  for(const [q,r] of RING2_CELLS) pushCell(q, r, 'locked');    // 5次升级按对解锁(后→前)

  for(const cell of hexCells){
    const {x,y} = hexToPixel(cell.q, cell.r, cx, cy);
    cell.px = x; cell.py = y;
    const cont = new PIXI.Container(); cont.x=x; cont.y=y;
    cont.interactive=true; cont.cursor='pointer';
    cont.hitArea = new PIXI.Polygon(hexCorners(HEX_SIZE));
    const bg = new PIXI.Graphics();
    cont.addChild(bg);
    cell.cont=cont; cell.bg=bg;
    drawCell(cell);
    cont.on('pointerup',()=>{ onCellClick(cell); });
    worldC.addChild(cont);
  }

  // 城墙：包裹已揭示/可翻区域的弧线
  wallGfx = new PIXI.Graphics();
  drawWall();
  worldC.addChild(wallGfx);
}

function drawLanes(){
  const g = new PIXI.Graphics();
  // 三路淡色通道
  const laneHalf = (LANES[1]-LANES[0]) * 0.46;
  for(const lx of LANES){
    g.beginFill(0x16242c, 0.5);
    g.drawRoundedRect(lx-laneHalf, -HEX_SIZE, laneHalf*2, LANE_MERGE_Y+HEX_SIZE, 10);
    g.endFill();
  }
  // 障碍六边形地格（分割左/中/右路，替代竖线）
  for(const bq of [-2, 2]){
    const bpx = cx + HEX_COL * bq;
    const rMin = Math.floor((-cy - HEX_SIZE*2) / HEX_ROW - bq*0.5) - 1;
    const rMax = Math.ceil((LANE_MERGE_Y - cy) / HEX_ROW - bq*0.5) + 1;
    for(let r = rMin; r <= rMax; r++){
      const bpy = HEX_ROW * (r + bq*0.5) + cy;
      if(bpy < -HEX_SIZE || bpy > LANE_MERGE_Y - HEX_ROW*2) continue;
      g.beginFill(0x18303d, 0.95);
      g.lineStyle(1.5, 0x2a5060, 0.8);
      g.drawPolygon(hexPoly(bpx, bpy, HEX_SIZE - 1));
      g.endFill(); g.lineStyle(0);
      g.beginFill(0x3d6878, 0.7); g.drawCircle(bpx, bpy, 5); g.endFill();
      g.beginFill(0x3d6878, 0.4); g.drawCircle(bpx-9, bpy+7, 3); g.endFill();
      g.beginFill(0x3d6878, 0.35); g.drawCircle(bpx+8, bpy-6, 2.5); g.endFill();
    }
  }
  // 汇聚提示线
  g.lineStyle(1.5, 0x4a6a7a, 0.35);
  g.moveTo(LANES[0]-laneHalf, LANE_MERGE_Y); g.lineTo(LANES[2]+laneHalf, LANE_MERGE_Y);
  g.lineStyle(0);
  // 传送门：左路(LANES[0])蓝色 + 右路(LANES[2])橙红 + 中路绿色（下移2格）
  const portalY = HEX_SIZE * 2;
  const pr = HEX_SIZE * 1.8;
  // 左路传送门
  g.lineStyle(3, 0x44aaff, 0.85); g.beginFill(0x44aaff, 0.12); g.drawCircle(LANES[0], portalY, pr); g.endFill(); g.lineStyle(0);
  g.lineStyle(2, 0x44aaff, 0.5); g.drawCircle(LANES[0], portalY, pr*0.5); g.lineStyle(0);
  // 右路传送门
  g.lineStyle(3, 0xff5533, 0.85); g.beginFill(0xff5533, 0.12); g.drawCircle(LANES[2], portalY, pr); g.endFill(); g.lineStyle(0);
  g.lineStyle(2, 0xff5533, 0.5); g.drawCircle(LANES[2], portalY, pr*0.5); g.lineStyle(0);
  // 中路传送门（绿色，与左右路同高）
  const cPortalY = HEX_SIZE*2.5;
  g.lineStyle(3, 0x44ff99, 0.85); g.beginFill(0x44ff99, 0.1); g.drawCircle(cx, cPortalY, pr); g.endFill(); g.lineStyle(0);
  g.lineStyle(2, 0x44ff99, 0.45); g.drawCircle(cx, cPortalY, pr*0.5); g.lineStyle(0);
  worldC.addChild(g);
}

function drawWall(){
  if(!wallGfx) return;
  wallGfx.clear();
  const outerCells = hexCells.filter(c=>c.state!=='base');
  if(!outerCells.length) return;
  let minX=Infinity,maxX=-Infinity,minY=Infinity;
  for(const c of outerCells){ minX=Math.min(minX,c.px); maxX=Math.max(maxX,c.px); minY=Math.min(minY,c.py); }
  const wallColor = wallFlash > 0 ? 0xff3333 : 0x4a6a7a;
  const wallAlpha = wallFlash > 0 ? 0.8 : 0.5;
  const pad = HEX_SIZE + 8;
  const wcx = (minX+maxX)/2, wTop = minY - pad, wBottom = cy + pad/2;
  const wHalf = (maxX-minX)/2 + pad;
  wallGfx.lineStyle(3, wallColor, wallAlpha);
  wallGfx.moveTo(wcx - wHalf, wBottom);
  wallGfx.bezierCurveTo(wcx - wHalf, wTop - 20, wcx + wHalf, wTop - 20, wcx + wHalf, wBottom);
  // 底部横杆
  wallGfx.lineStyle(4, wallColor, wallAlpha * 0.7);
  wallGfx.moveTo(wcx - wHalf - 5, wBottom + 4);
  wallGfx.lineTo(wcx + wHalf + 5, wBottom + 4);
}

function drawCell(cell){
  const g=cell.bg, s=HEX_SIZE;
  g.clear();
  while(cell.cont.children.length>1) cell.cont.removeChildAt(1);

  const poly = hexCorners(s);

  if(cell.state==='base'){
    g.beginFill(0xffd24a,0.3); g.lineStyle(3,0xffd24a,0.9);
    g.drawPolygon(poly); g.endFill();
    const glow=new PIXI.Graphics(); glow.lineStyle(2,0xffd24a,0.5); glow.drawCircle(0,0,HEX_SIZE+6);
    cell.cont.addChild(glow);
    const t=new PIXI.Text('少',{fontSize:20,fill:'#ffd24a',fontWeight:'900'}); t.anchor.set(0.5); t.y=-5; cell.cont.addChild(t);
    const lvlT=new PIXI.Text('Lv'+baseLvl,{fontSize:9,fill:'#ffd24a',fontWeight:'700'}); lvlT.anchor.set(0.5); lvlT.y=11; cell.cont.addChild(lvlT);
  } else if(cell.state==='locked'){
    g.beginFill(0x0a0f12,0.4); g.lineStyle(1,0x151f25);
    g.drawPolygon(poly); g.endFill();
  } else if(cell.state==='flippable'){
    g.beginFill(0x1c2a33); g.lineStyle(1.5,0x2c3f4b);
    g.drawPolygon(poly); g.endFill();
    const t=new PIXI.Text('?',{fontSize:16,fill:'#3a5060',fontWeight:'800'}); t.anchor.set(0.5); cell.cont.addChild(t);
  } else if(cell.state==='empty'){
    g.beginFill(0x1c2a33,0.5); g.lineStyle(1,0x2c3f4b,0.4);
    g.drawPolygon(poly); g.endFill();
    const t=new PIXI.Text('↺',{fontSize:13,fill:'#3a5060'}); t.anchor.set(0.5); cell.cont.addChild(t);
  } else if(cell.state==='revealed'){
    const bt = B_TYPES.find(b=>b.key===cell.category) || B_TYPES[0];
    const gen = cell.general;
    const isMaxLvl = cell.lvl >= TUNE.maxLvl && gen;
    // 分级配色：Lv1暗/细框 → Lv2适中 → Lv3亮/粗框 → Lv4特效
    const alphaArr=[0,0.12,0.28,0.46]; const bwArr=[0,1.5,2.5,3]; const baArr=[0,0.5,0.85,1];
    const alpha = isMaxLvl ? 0.55 : (alphaArr[cell.lvl]??0.12);
    const bw    = isMaxLvl ? 3    : (bwArr[cell.lvl]??1.5);
    const ba    = isMaxLvl ? 1    : (baArr[cell.lvl]??0.5);
    g.beginFill(bt.hex, alpha); g.lineStyle(bw, bt.hex, ba);
    g.drawPolygon(poly); g.endFill();

    if(isMaxLvl){
      const glow=new PIXI.Graphics(); glow.lineStyle(2, bt.hex, 0.45); glow.drawCircle(0,0,HEX_SIZE+5);
      cell.cont.addChild(glow);
    }

    const glyph = gen ? gen.glyph : bt.glyph;
    const glyphColor = isMaxLvl ? '#ffd24a' : bt.css;
    const t=new PIXI.Text(glyph,{fontSize:16,fill:glyphColor,fontWeight:'800'}); t.anchor.set(0.5); t.y=-4; cell.cont.addChild(t);
    const label = isMaxLvl ? gen.name : 'Lv'+cell.lvl+' '+(gen?gen.name:'');
    const labelColor = isMaxLvl ? '#ffd24a' : '#ccc';
    const lvlT=new PIXI.Text(label,{fontSize:9,fill:labelColor,fontWeight:'600'}); lvlT.anchor.set(0.5); lvlT.y=12; cell.cont.addChild(lvlT);

    // 等级点（Lv2=2点, Lv3=3点，帮助辨认合成目标）
    if(!isMaxLvl && cell.lvl>=2){
      for(let pip=0;pip<cell.lvl;pip++){
        const px=(pip-(cell.lvl-1)/2)*7, py=HEX_SIZE*0.62;
        const pG=new PIXI.Graphics(); pG.beginFill(bt.hex,0.9); pG.drawCircle(px,py,2.5); pG.endFill();
        cell.cont.addChild(pG);
      }
    }

    // 常驻合成提示：场上存在同将同级可配对时显示黄色外框
    const canMerge = !isMaxLvl && hexCells.some(c=>c!==cell&&c.state==='revealed'&&c.lvl===cell.lvl&&c.building===cell.building&&c.lvl<TUNE.maxLvl);
    if(canMerge){
      const mg=new PIXI.Graphics(); mg.lineStyle(2,0xffdd00,0.75); mg.drawPolygon(hexCorners(HEX_SIZE+3));
      mg.name='mergeReady'; cell.cont.addChild(mg);
    }
  }

  if(cell===selectedCell && cell.state==='revealed'){
    const sel=new PIXI.Graphics(); sel.lineStyle(3,0xffd24a); sel.drawPolygon(hexCorners(s+2)); cell.cont.addChild(sel);
  }
}

// ===== 点击逻辑 =====
function onCellClick(cell){
  if(gameOver || pendingPick) return;
  ensureAudio();

  if(mergeMode && selectedCell){
    if(cell===selectedCell){ cancelMerge(); return; }
    if(cell.state==='revealed' && cell.lvl===selectedCell.lvl && cell.lvl<TUNE.maxLvl && cell.building===selectedCell.building){
      doMerge(selectedCell, cell); return;
    }
    cancelMerge(); return;
  }

  if(cell.state==='flippable' || cell.state==='empty'){
    const _np = FLIP_PRICES[Math.min(totalFlips, FLIP_PRICES.length-1)];
    if(gold < _np){
      spawnFloat(cell.px, cell.py-20, '需要'+_np+'G', 0xff8844);
      blip(200, 0.05, 'sine', 0.06);
      return;
    }
    flipCell(cell);
  } else if(cell.state==='revealed' && cell.lvl<TUNE.maxLvl){
    startMerge(cell);
  }
}

function startMerge(cell){
  selectedCell=cell; mergeMode=true;
  drawCell(cell);
  document.getElementById('mergeHint').style.display='block';
  for(const c of hexCells){
    if(c===cell) continue;
    if(c.state==='revealed' && c.lvl===cell.lvl && c.lvl<TUNE.maxLvl && c.building===cell.building){
      const hl=new PIXI.Graphics(); hl.lineStyle(2.5,0xffd24a,0.9); hl.drawPolygon(hexCorners(HEX_SIZE-1));
      hl.name='mergeHL'; c.cont.addChild(hl);
    } else if(c.state==='revealed' || c.state==='flippable' || c.state==='empty'){
      const dim=new PIXI.Graphics(); dim.beginFill(0x000000,0.45); dim.drawPolygon(hexCorners(HEX_SIZE));
      dim.name='mergeDim'; c.cont.addChild(dim);
    }
  }
}

function cancelMerge(){
  if(selectedCell) drawCell(selectedCell);
  selectedCell=null; mergeMode=false;
  document.getElementById('mergeHint').style.display='none';
  for(const c of hexCells){
    const hl=c.cont.getChildByName('mergeHL');
    if(hl) c.cont.removeChild(hl);
    const dim=c.cont.getChildByName('mergeDim');
    if(dim) c.cont.removeChild(dim);
  }
}

function doMerge(source, target){
  target.lvl++;

  const gen = target.general;
  const bt = B_TYPES.find(b=>b.key===target.category);

  source.state='empty'; source.building=null; source.category=null; source.lvl=0; source.general=null; source.generalOut=false; source.generalRespawnTimer=0;
  cancelMerge();
  drawCell(source); drawCell(target);
  for(const c of hexCells) if(c!==source&&c!==target&&c.state==='revealed') drawCell(c);

  const isMaxLvl = target.lvl >= TUNE.maxLvl;
  burstSound(target.lvl);

  if(isMaxLvl){
    target.cont.scale.set(1.45);
    setTimeout(()=>target.cont.scale.set(1), 220);
    shake=14;
    for(let i=0;i<4;i++) setTimeout(()=>burstSound(4), i*110);
    if(gen){
      spawnFloat(target.px, target.py-52, gen.name + ' 降临！', 0xffd24a);
      spawnFloat(target.px, target.py-28, gen.desc, bt ? bt.hex : 0xffd24a);
      // Lv4爆点：触发该武将专属强化选择
      showGeneralUpgradePick(gen);
    }
  } else {
    target.cont.scale.set(1.25);
    setTimeout(()=>target.cont.scale.set(1), 130);
    if(gen && bt){
      spawnFloat(target.px, target.py-28, gen.glyph+' Lv'+target.lvl, bt.hex);
    }
  }

  // 合成只影响战力，不再触发升级（升级由翻牌次数驱动）
  updateHUD();
  drawWall();
  // 引导步骤推进
  if(guideStep===1){
    guideStep=2;
    clearGuidePulses();
    hideGuideHint();
  }
}

// ===== 武将降临（随机从同类已选将中分配） =====
function showGeneralPick(cell, bt){
  const pool = draftPicks.filter(g => g.category === bt.key);
  const gen = pool.length > 0
    ? pool[Math.floor(Math.random()*pool.length)]
    : GENERALS[bt.key][Math.floor(Math.random()*GENERALS[bt.key].length)];
  cell.general = gen;
  drawCell(cell);
  spawnFloat(cell.px, cell.py-52, gen.name + ' 降临！', 0xffd24a);
  spawnFloat(cell.px, cell.py-28, gen.desc, bt.hex);
  burstSound(4);
  updateHUD();
}

// ===== 武将升满Lv4时的专属强化选择 =====
function showGeneralUpgradePick(gen){
  const upgrades = GENERAL_UPGRADES[gen.key] || [];
  // 过滤已选中的词条
  const available = upgrades.filter(u => !globalBuffs[u.key]);
  if(available.length === 0) return; // 两条都选过了，跳过

  pendingPick = { type:'generalUpgrade', options: available };
  const overlay = document.getElementById('pickOverlay');
  const title = document.getElementById('pickTitle');
  const optDiv = document.getElementById('pickOptions');
  title.textContent = gen.name + ' 降临强化 —— 选择专属技能';
  optDiv.innerHTML = '';
  available.forEach((buff, idx) => {
    const card = document.createElement('div');
    card.className = 'pick-card';
    card.innerHTML = `<div class="pick-icon">${buff.icon}</div><div class="pick-name">${buff.name}</div><div class="pick-desc">${buff.desc}</div>`;
    card.onclick = () => pickBuff(idx);
    optDiv.appendChild(card);
  });
  overlay.style.display = 'flex';
}

// ===== 通用词条选择（基地升级时） =====
function buildBuffPool(){
  const pool = [...BUFF_POOL_COMMON];
  const usedKeys = new Set(Object.keys(globalBuffs));
  // 少年强化词条
  for(const u of SHAONIAN_UPGRADES){ if(!usedKeys.has(u.key)) pool.push(u); }
  for(const gen of draftPicks){
    const upgrades = GENERAL_UPGRADES[gen.key] || [];
    for(const u of upgrades){
      if(!usedKeys.has(u.key)) pool.push(u);
    }
  }
  return pool;
}

function showBuffPick(){
  const pool = buildBuffPool();
  const options = shuffle(pool).slice(0, 3);
  pendingPick = { type:'buff', options };
  const overlay = document.getElementById('pickOverlay');
  const title = document.getElementById('pickTitle');
  const optDiv = document.getElementById('pickOptions');
  title.textContent = '基地升级奖励 —— 选择增益';
  optDiv.innerHTML = '';
  options.forEach((buff, idx) => {
    const card = document.createElement('div');
    card.className = 'pick-card';
    card.innerHTML = `<div class="pick-icon">${buff.icon}</div><div class="pick-name">${buff.name}</div><div class="pick-desc">${buff.desc}</div>`;
    card.onclick = () => pickBuff(idx);
    optDiv.appendChild(card);
  });
  // 广告刷新按钮（每局3次）+ 我全都要（每局1次）
  const rerollRow = document.createElement('div');
  rerollRow.style.cssText = 'width:100%;display:flex;gap:10px;justify-content:center;align-items:flex-end;margin-top:12px;flex-wrap:wrap;';
  const remaining = 1 - buffRerollUsed;
  const rerollStyle = remaining <= 0 ? 'opacity:0.4;cursor:default;' : 'cursor:pointer;';
  const takeAllStyle = takeAllUsed ? 'opacity:0.35;cursor:default;' : 'cursor:pointer;';
  rerollRow.innerHTML = `
    <button id="rerollBtn" onclick="rerollBuff()" style="background:#162e1e;color:#6fe89a;border:1px solid #2e6640;border-radius:6px;padding:6px 14px;font-size:12px;${rerollStyle}">📺 看广告刷新 (${remaining}/1)</button>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
      <button onclick="pickAllBuffs()" style="background:#2a3a10;color:#ffd24a;border:2px solid #8a9a22;border-radius:8px;padding:9px 22px;font-size:15px;font-weight:700;${takeAllStyle}">✨ 我全都要${takeAllUsed?' (已使用)':''}</button>
      <div style="font-size:10px;color:#5a8a9a;">💎 购买终身卡，每局1次</div>
    </div>`;
  optDiv.appendChild(rerollRow);
  overlay.style.display = 'flex';
}

function rerollBuff(){
  if(buffRerollUsed >= 1) return;
  buffRerollUsed++;
  showBuffPick();
}

function pickAllBuffs(){
  if(!pendingPick || takeAllUsed) return;
  takeAllUsed = true;
  const { options } = pendingPick;
  for(const buff of options){
    if(globalBuffs[buff.key]) continue;
    globalBuffs[buff.key] = true;
    if(buff.apply) buff.apply(globalBuffs);
    if(buff.applyCell){ for(const cell of hexCells) buff.applyCell(cell, globalBuffs); }
    appliedBuffs.push(buff);
    spawnFloat(cx + (Math.random()-0.5)*60, cy - 70 + (Math.random()-0.5)*20, buff.icon + ' ' + buff.name, 0x4aff8a);
  }
  pendingPick = null;
  document.getElementById('pickOverlay').style.display = 'none';
  burstSound(3); updateHUD();
}

function pickBuff(idx){
  const { options } = pendingPick;
  const buff = options[idx];
  globalBuffs[buff.key] = true;
  if(buff.apply) buff.apply(globalBuffs);
  if(buff.applyCell){
    for(const cell of hexCells) buff.applyCell(cell, globalBuffs);
  }
  appliedBuffs.push(buff);
  pendingPick = null;
  document.getElementById('pickOverlay').style.display = 'none';
  spawnFloat(cx, cy-70, buff.icon + ' ' + buff.name, 0x4aff8a);
  burstSound(2);
  updateHUD();
}

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ===== 翻格 =====
function flipCell(cell){
  const pool = draftPicks.length > 0 ? draftPicks : [...GENERALS.advance, ...GENERALS.defense];
  const gen = pool[Math.floor(Math.random()*pool.length)];
  cell.building = gen.key;
  cell.category = gen.category;
  cell.general = gen;
  cell.lvl = globalBuffs.flipMinLvl || 1;
  cell.state = 'revealed';
  if(cell.cdArc) cell.cdArc.clear();
  cell.generalOut = false;
  cell.generalRespawnTimer = 0;
  drawCell(cell);

  totalFlips++;
  const _priceIdx = Math.min(totalFlips - 1, FLIP_PRICES.length - 1);
  const _price = FLIP_PRICES[_priceIdx];
  gold -= _price; goldSpent += _price;
  blip(480+Math.random()*80, 0.06, 'triangle', 0.12);
  cell.cont.scale.set(1.15); setTimeout(()=>cell.cont.scale.set(1),100);
  const bt = B_TYPES.find(b=>b.key===gen.category);
  spawnFloat(cell.px, cell.py-24, gen.glyph, bt ? bt.hex : 0xffffff);
  drawCell(cell);
  for(const c of hexCells) if(c!==cell&&c.state==='revealed') drawCell(c);

  checkLevelUp();
  updateHUD();
  // 引导步骤推进
  if(guideStep===0){
    guideStep=1;
    clearGuidePulses();
    showGuideHint('☝ 点击武将格，再点同种同级格 → 合并升阶');
  }
}

// ===== 基地升级（格子耗尽触发） =====
// ===== 基地升级（翻牌累计次数触发，而非铺满地块） =====
function checkLevelUp(){
  if(pendingPick) return;
  const upDone = baseLvl - 1; // 已完成的升级次数
  if(upDone >= UPGRADE_FLIPS.length) return; // 升级次数已达上限
  if(totalFlips < UPGRADE_FLIPS[upDone]) return; // 还没翻够
  if(!hexCells.some(c => c.state==='locked')) return; // 没有可解锁的地格
  baseLvl++;
  const _bc=hexCells.find(c=>c.state==='base'); if(_bc) drawCell(_bc);
  unlockRing();
  spawnFloat(cx, cy-55, '基地 Lv'+baseLvl+'!', 0xffd24a);
  burstSound(3); shake=5;
  updateHUD();
  showBuffPick();
}

function unlockRing(){
  // 后排→前排解锁：按 py 降序（下方/靠近基地的先开），同 y 的左右对一起开
  const locked = hexCells.filter(c=>c.state==='locked')
    .sort((a,b) => {
      if(Math.abs(a.py - b.py) > 0.5) return b.py - a.py; // py 大(靠下/后排)优先
      return Math.abs(a.px - cx) - Math.abs(b.px - cx);   // 同排时左右对称
    });
  if(!locked.length) return;
  // 平滑解锁曲线：把剩余地格均摊到剩余的升级次数上（9格/5次 → 2/2/2/2/1）
  const done = baseLvl - 1;                              // 含本次在内已完成的升级数
  const upgradesLeftIncl = Math.max(1, UPGRADE_FLIPS.length - done + 1);
  const count = Math.min(locked.length, Math.ceil(locked.length / upgradesLeftIncl));
  for(let i=0; i<count; i++){
    locked[i].state = 'flippable';
    drawCell(locked[i]);
  }
}

// ===== 敌人 =====
const LANE_NAMES = ['左路', '中路', '右路'];
const WAVE_TYPES = [
  { key:'normal', name:'常规', countMul:1.0, hpMul:1.0,  spdMul:1.0,  color:0xff3333, size:8 },
  { key:'swarm',  name:'人海', countMul:2.5, hpMul:0.6,  spdMul:1.1,  color:0xff6633, size:6 },
  { key:'elite',  name:'精英', countMul:0.15,hpMul:10.0, spdMul:0.3, color:0xcc00ff, size:16, noAttack:true },
  { key:'speed',  name:'疾行', countMul:1.0, hpMul:0.6,  spdMul:1.9,  color:0x33ffaa, size:7 },
];

function lvlScale(lvl){ return Math.pow(1.7, lvl - 1); }

function spawnWave(){
  if(gameOver) return;
  waveCount++;
  if(waveCount > 15){
    // 所有波次已发完，等场上清空再胜利
    spawnFloat(cx, cy-80, '最终波已结束！清空残敌！', 0xffd24a);
    return;
  }

  // BOSS波：第8波固定出曹操（15波弧线中点），替换当波普通怪
  if(waveCount === 8){ spawnBoss(); return; }

  const hpBase = waveCount <= 3
    ? Math.round((15 + waveCount * 8) * 0.9)
    : Math.round(40 * Math.pow(1.35, waveCount - 3) * 0.9);
  const baseCount = 1 + Math.floor(waveCount * 0.6);

  // 最后几波（≥13）：分三级人海冲锋，逐波递增
  if(waveCount >= 13){
    const swarm = WAVE_TYPES[1], normal = WAVE_TYPES[0];
    const lanes = waveCount >= 14 ? [0,1,2] : [0,2];
    const capCnt = waveCount===13 ? 12 : waveCount===14 ? 15 : 18;
    const extraMul = waveCount===15 ? 1.1 : 1.0;
    spawnFloat(cx, cy - 100, '波次'+waveCount+' · ⚠人海冲锋 ×'+lanes.length+'路', 0xff3399, {life:180,fontSize:15});
    for(const ln of lanes){
      const wt = (ln===1) ? normal : swarm;
      const cnt = Math.max(3, Math.min(capCnt, Math.round(baseCount * wt.countMul * extraMul)));
      spawnGroup(wt, Math.round(hpBase*wt.hpMul), cnt, ln);
    }
    return;
  }

  // 波次类型：1-7波顺序循环(固定手感)，8波后随机；≥14波禁精英
  const allowedTypes = waveCount >= 14 ? [0, 1, 3] : [0, 1, 2, 3];
  const typeIdx = waveCount <= 7 ? (waveCount - 1) % 4 : allowedTypes[Math.floor(Math.random()*allowedTypes.length)];
  const wt = WAVE_TYPES[typeIdx];
  const hp = Math.round(hpBase * wt.hpMul);
  const count = Math.max(3, Math.min(18, Math.round(baseCount * wt.countMul)));
  const laneIdx = (typeIdx === 2) ? (eliteLaneCycle++ % 3) : Math.floor(Math.random()*3);
  spawnFloat(cx, cy - 100, '波次'+waveCount+' · '+wt.name+' ['+LANE_NAMES[laneIdx]+']', wt.color, {life:180,fontSize:15});
  spawnFloat(LANES[laneIdx], 32, '▼ '+LANE_NAMES[laneIdx], wt.color, {life:150,fontSize:14});
  spawnGroup(wt, hp, count, laneIdx);

  // 波次4-7：延迟2s出疾行斥候，填补第4波间隔拉长+波5-7的送金空窗（Bug-4 fix: 覆盖第4波）
  if(waveCount >= 4 && waveCount <= 7 && typeIdx !== 3){
    const spd = WAVE_TYPES[3]; // 疾行
    const bonusLane = (laneIdx + 1 + Math.floor(Math.random()*2)) % 3;
    const bonusCnt = 2 + (waveCount - 4); // 3/4/5只
    setTimeout(()=>{ if(!gameOver) spawnGroup(spd, Math.round(hpBase*spd.hpMul*0.8), bonusCnt, bonusLane); }, 2000);
    spawnFloat(LANES[bonusLane], 40, '⚡斥候', spd.color, {life:120,fontSize:12});
  }
  // 精英波：添加速度缓慢的随行护卫（簇拥精英）
  if(typeIdx === 2){
    const escortWt = { key:'normal', name:'随行', countMul:1, hpMul:1, spdMul:0.25, color:0xcc88ff, size:6, noAttack:false };
    spawnGroup(escortWt, Math.round(hpBase*2), 2, laneIdx);
  }
}

function spawnGroup(wt, hp, count, laneIdx){
  const laneX = LANES[laneIdx!=null ? laneIdx : 1];
  const laneHalf = (LANES[1]-LANES[0]) * 0.4; // 路内横向散布
  const diffMul = 1 + (difficulty - 1) * 0.03;
  const scaledHp = Math.round(hp * diffMul);
  for(let i=0;i<count;i++){
    const spread = laneHalf * 0.5;
    const sx = laneX + (Math.random()-0.5)*spread;
    const sy = laneIdx === 1
             ? HEX_SIZE*2.5 + (Math.random()-0.5)*HEX_SIZE  // 中路：传送门位置（上移2格）
             : HEX_SIZE*2 + (Math.random()-0.5)*HEX_SIZE;   // 左右路：传送门位置
    const waveSpdMul = 1 + Math.floor(waveCount / 3) * 0.05;
    const earlyWaveBoost = waveCount <= 2 ? 2.0 : 1.0; // 前两波走快一倍，尽早送金币
    const spd = TUNE.enemySpd * wt.spdMul * waveSpdMul * earlyWaveBoost * (0.85+Math.random()*0.3);
    const e = { x:sx, y:sy, hp:scaledHp, maxHp:scaledHp, speed:spd, cont:null, laneX, waveType:wt.key, noAttack:wt.noAttack||false, size:wt.size||8 };

    const cont=new PIXI.Container(); cont.x=sx; cont.y=sy;
    const body=new PIXI.Graphics(); body.beginFill(wt.color); body.drawCircle(0,0,wt.size); body.endFill(); cont.addChild(body);
    const statusRing=new PIXI.Graphics(); cont.addChild(statusRing); e.statusRing=statusRing;
    const hpBg=new PIXI.Graphics(); hpBg.beginFill(0x222); hpBg.drawRect(-8,-12,16,3); hpBg.endFill(); cont.addChild(hpBg);
    const hpFill=new PIXI.Graphics(); cont.addChild(hpFill);
    e.hpFill=hpFill; e.cont=cont;
    updateEnemyHP(e);
    enemyC.addChild(cont);
    enemies.push(e);
  }
}

function openBossChest(){
