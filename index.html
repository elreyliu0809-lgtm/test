  spawnGroup(guardWt, guardHp, 4, 1);
  spawnFloat(cx, cy-120, '⚠ BOSS 降临 · 魏王曹操', 0xffa500);
  shake=12; burstSound(4);
}

function onBossDeath(e){
  if(battleStartTime > 0) bossKillTime = Math.round((performance.now() - battleStartTime) / 1000);
  boss = null;
  if(bossAoe){ if(bossAoe.gfx) projC.removeChild(bossAoe.gfx); bossAoe = null; }
  shake = 26;
  spawnFloat(e.x, e.y-34, '曹操已退！', 0xffa500);
  burstSound(5);
  for(let i=0;i<16;i++){
    const ang=(Math.PI*2/16)*i;
    spawnFloat(e.x+Math.cos(ang)*34, e.y+Math.sin(ang)*34, '✦', 0x8b6200);
  }
  // 掉落强化宝箱：点击开出三选一（不再立即弹）
  spawnBossChest(e.x, Math.min(e.y, cy - HEX_SIZE*3));
}

// ===== 强化宝箱（boss掉落，点击开箱→三选一） =====
function spawnBossChest(x, y){
  if(bossChest) return;
  const cont = new PIXI.Container(); cont.x=x; cont.y=y;
  cont.interactive=true; cont.cursor='pointer';
  cont.hitArea = new PIXI.Circle(0,0,36);
  // 光柱
  const beam = new PIXI.Graphics();
  beam.beginFill(0x8b6200, 0.18); beam.drawRect(-8, -90, 16, 90); beam.endFill();
  beam.beginFill(0x8b6200, 0.08); beam.drawRect(-18, -90, 36, 90); beam.endFill();
  cont.addChild(beam);
  // 脉冲发光圈（动态更新）
  const glow = new PIXI.Graphics(); glow.name='chestGlow'; cont.addChild(glow);
  // 宝箱本体
  const g=new PIXI.Graphics();
  g.beginFill(0x7a4515); g.lineStyle(3,0x8b6200,1); g.drawRoundedRect(-18,-14,36,28,5); g.endFill();
  g.lineStyle(2,0x8b6200,0.9); g.moveTo(-18,-2); g.lineTo(18,-2);
  g.beginFill(0x8b6200); g.drawRect(-5,-8,10,10); g.endFill();
  g.lineStyle(0); g.beginFill(0xffaa22,0.5); g.drawCircle(0,-2,4); g.endFill();
  cont.addChild(g);
  const t=new PIXI.Text('点击开启！',{fontSize:12,fill:'#8b6200',fontWeight:'900',stroke:'#000',strokeThickness:3});
  t.anchor.set(0.5); t.y=-32; cont.addChild(t);
  cont.on('pointerdown', ()=>openBossChest());
  floatC.addChild(cont);
  bossChest = { cont, baseX:x, baseY:y, animTimer:0 };
  spawnFloat(x, y-56, '★ 强化宝箱掉落！', 0x4aff8a);
  spawnFloat(x, y-72, '点击开启', 0x8b6200);
}

function openBossChest(){
  if(!bossChest || pendingPick) return;
  floatC.removeChild(bossChest.cont);
  bossChest = null;
  burstSound(3); shake=6;
  showBuffPick(); // 已是三选一
}

function updateEnemyHP(e){
  const pct=Math.max(0,e.hp/e.maxHp);
  if(e.isBoss){
    e.hpFill.clear(); e.hpFill.beginFill(0xff3333); e.hpFill.drawRect(-24,-e.size-7,48*pct,4); e.hpFill.endFill();
    return;
  }
  e.hpFill.clear(); e.hpFill.beginFill(0xff5555); e.hpFill.drawRect(-8,-12,16*pct,3); e.hpFill.endFill();
}

function removeEnemy(idx){
  const e=enemies[idx];
  if(e && e.isBoss) onBossDeath(e);
  else if(e && e.waveType && GOLD_PER_KILL[e.waveType]){
    const drop = Math.round(waveCount * GOLD_PER_KILL[e.waveType] * TUNE.goldMul);
    if(drop > 0){
      gold += drop; goldEarned += drop;
      if(drop >= 20) spawnFloat(e.x, e.y-14, '+'+drop+'G', 0x8b6200);
      updateHUD();
    }
  }
  enemyC.removeChild(enemies[idx].cont); enemies.splice(idx,1);
}

// ===== 战斗 tick =====

function tick(dt){
  if(gameOver || pendingPick || gamePaused || modeSelecting) return;

  // 横向滚动偏移已移除，所有容器固定在0
  bgHexC.x = worldC.x = enemyC.x = projC.x = floatC.x = 0;

  if(shake>0){ worldC.x=(Math.random()-0.5)*shake; worldC.y=(Math.random()-0.5)*shake; shake*=0.84; if(shake<0.3){shake=0;worldC.y=0;worldC.x=0;} }

  // 城墙受击闪红衰减
  if(wallFlash>0){ wallFlash--; drawWall(); }

  // 宝箱动画：脉冲缩放+抖动+发光圈
  if(bossChest){
    bossChest.animTimer += app.ticker.deltaMS;
    const at = bossChest.animTimer;
    const pulse = 1 + Math.sin(at/220)*0.13;
    bossChest.cont.scale.set(pulse);
    bossChest.cont.rotation = Math.sin(at/160)*0.1;
    const glow = bossChest.cont.getChildByName('chestGlow');
    if(glow){
      glow.clear();
      const a1 = 0.35 + Math.abs(Math.sin(at/280))*0.55;
      glow.lineStyle(4, 0x8b6200, a1); glow.drawCircle(0, 0, 22+Math.sin(at/190)*5);
      glow.lineStyle(2, 0xffaa22, a1*0.7); glow.drawCircle(0, 0, 32+Math.sin(at/190+1)*5);
    }
  }

  // 翻格可负担性视觉：金币足→可翻格金光脉冲(邀请翻格)；金币不足→明显压暗(翻不动)
  const _nextFlipPrice = FLIP_PRICES[Math.min(totalFlips, FLIP_PRICES.length-1)];
  const _canAfford = gold >= _nextFlipPrice;
  const _flipPulse = 0.5 + Math.abs(Math.sin(performance.now()/350))*0.5;   // 0~1 呼吸脉冲
  for(const cell of hexCells){
    const _isFlip = cell.state==='flippable' || cell.state==='empty';
    if(!_isFlip){ if(cell.cdArc) cell.cdArc.clear(); continue; }
    if(!cell.cdArc) cell.cdArc=new PIXI.Graphics();
    if(cell.cont.children.indexOf(cell.cdArc)<0) cell.cont.addChild(cell.cdArc);
    cell.cdArc.clear();
    if(_canAfford){
      // 可翻：金色脉冲高亮，明确"现在能翻"
      cell.cdArc.beginFill(0xffcc44, 0.10 + _flipPulse*0.12);
      cell.cdArc.drawPolygon(hexCorners(HEX_SIZE)); cell.cdArc.endFill();
      cell.cdArc.lineStyle(2.5, 0xffd24a, 0.4 + _flipPulse*0.45);
      cell.cdArc.drawPolygon(hexCorners(HEX_SIZE));
    } else {
      // 金币不足：深色压暗，明确"翻不动"
      cell.cdArc.beginFill(0x140d04, 0.5);
      cell.cdArc.drawPolygon(hexCorners(HEX_SIZE)); cell.cdArc.endFill();
      cell.cdArc.lineStyle(1.5, 0x5a4428, 0.5);
      cell.cdArc.drawPolygon(hexCorners(HEX_SIZE));
    }
  }

  // 金币仅来源于击杀怪物（涓流已移除）

  // PvP 双端产金：玩家建筑被动产金（进攻+12/防守+8 每5s）+ 敌方涓流 + 金矿占领产金 + AI 翻格滚雪球
  if(PVP_MODE){
    goldTrickleTimer += app.ticker.deltaMS;
    enemyGoldTrickleTimer += app.ticker.deltaMS;
    while(goldTrickleTimer >= MINE_INCOME_MS){
      goldTrickleTimer -= MINE_INCOME_MS;
      const advCount = hexCells.filter(c=>c.category==='advance'&&c.state==='revealed').length;
      const defCount = hexCells.filter(c=>c.category==='defense'&&c.state==='revealed').length;
      const playerIncome = advCount * 12 + defCount * 8;
      if(playerIncome > 0){ gold += playerIncome; goldEarned += playerIncome; spawnFloat(cx+30, cy-20, '+'+playerIncome+'G', 0xffcc44, {life:50,fontSize:11}); updateHUD(); }
    }
    while(enemyGoldTrickleTimer >= MINE_INCOME_MS){
      enemyGoldTrickleTimer -= MINE_INCOME_MS;
      enemyGold += ENEMY_TRICKLE_AMOUNT;
    }
    // 金矿占领（部队进入即占，双方同在=保持现主）+ 产金
    for(const m of goldMines){
      const pNear = troops.some(t=>Math.hypot(t.x-m.px, t.y-m.py) < HEX_SIZE*1.5);
      const eNear = enemies.some(e=>e.isPvpTroop && Math.hypot(e.x-m.px, e.y-m.py) < HEX_SIZE*1.5);
      if(pNear && !eNear && m.owner!=='player'){ m.owner='player'; drawGoldMine(m); }
      else if(eNear && !pNear && m.owner!=='enemy'){ m.owner='enemy'; drawGoldMine(m); }
      if(m.owner!=='neutral'){
        m.incomeTimer += app.ticker.deltaMS;
        if(m.incomeTimer >= MINE_INCOME_MS){
          m.incomeTimer -= MINE_INCOME_MS;
          if(m.owner==='player'){
            gold += MINE_INCOME; goldEarned += MINE_INCOME;
            spawnFloat(m.px, m.py-22, '+'+MINE_INCOME+'G ⛏', 0xf0c040, {life:55,fontSize:11});
            updateHUD();
          } else {
            enemyGold += MINE_INCOME;
          }
        }
      }
    }
    // AI 翻格决策（金币驱动滚雪球）
    aiFlipDecTimer += app.ticker.deltaMS;
    if(aiFlipDecTimer >= AI_FLIP_DECISION_MS){
      aiFlipDecTimer -= AI_FLIP_DECISION_MS;
      aiTryFlip();
    }
  }

  // 少年·城墙修复：每5秒回复10HP
  if(globalBuffs.wallRegen_shaonian && baseHP < maxHP){
    wallRegenTimer += app.ticker.deltaMS;
    if(wallRegenTimer >= 5000){ wallRegenTimer -= 5000; baseHP = Math.min(maxHP, baseHP + 10); spawnFloat(cx, cy - 42, '+10 城修', 0x44ff99); updateHUD(); }
  }

  waveTimer += app.ticker.deltaMS;
  const _curWaveMs = waveCount <= 6 ? 9000 : waveCount <= 12 ? 10000 : 8000;
  if(waveTimer>=_curWaveMs && !inDraft){ waveTimer=0; spawnWave(); }
  // 安全扫除：清理越界（吕布击退出屏）或 hp≤0 的残余敌人，防止卡死胜负判断
  for(let _si=enemies.length-1;_si>=0;_si--){
    if(enemies[_si].hp<=0 || enemies[_si].y < -HEX_SIZE*2){ removeEnemy(_si); }
  }
  // 胜利判断：15波全部发完 + 场上无残敌
  if(!PVP_MODE && waveCount > 15 && enemies.length === 0){ winGame(); return; }

  // PvP 对局倒计时 + 超时判定（到点比占领度，多者胜、相等平局）
  if(PVP_MODE && !gameOver && battleStartTime > 0){
    const matchLeft = MATCH_DURATION - (performance.now() - battleStartTime);
    if(_matchTimerEl){
      const secLeft = Math.max(0, Math.ceil(matchLeft/1000));
      _matchTimerEl.textContent = Math.floor(secLeft/60)+':'+String(secLeft%60).padStart(2,'0');
      _matchTimerEl.style.color = secLeft <= 30 ? '#ff7755' : '#f5e0c0'; // 最后30s告警色
    }
    if(matchLeft <= 0){ pvpTimeoutResolve(); return; }
  }
  // PvP 领地重绘（有变化时才重绘）
  if(PVP_MODE) pvpTerrDraw();
  if(_waveTimerEl) _waveTimerEl.textContent = waveCount>15 && !PVP_MODE ? '清场中' : Math.max(0,Math.ceil((_curWaveMs-waveTimer)/1000))+'s';
  if(_waveCountEl){
    if(!PVP_MODE && boss){ _waveCountEl.textContent=(waveCount>15?15:waveCount)+'/15 ⚠BOSS'; _waveCountEl.style.color='#ff5a5a'; }
    else if(!PVP_MODE){ _waveCountEl.textContent = waveCount>15 ? '15/15 ✓' : waveCount+'/15'; _waveCountEl.style.color=''; }
    else { _waveCountEl.textContent = '波次 '+waveCount; _waveCountEl.style.color=''; }
  }

  const now=performance.now();

  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    // 内层 AOE/溅射 removeEnemy 可能把当前 e 移到更低索引，导致下一轮再处理一次；用帧 ID 跳过
    if(e._frameId === now) continue;
    e._frameId = now;

    // 张飞「火爆」灼烧标记：持续伤害（stun不打断）
    if(e.zhangfeiBurnUntil && now < e.zhangfeiBurnUntil){
      e._burnTimer=(e._burnTimer||0)+app.ticker.deltaMS;
      if(e._burnTimer>=500){ e._burnTimer=0; e.hp-=e._burnDmg||0;
        spawnFloat(e.x,e.y-10,Math.round(e._burnDmg||0)+'🔥',0xff6600);
        if(e.hp<=0){spawnFloat(e.x,e.y-12,'灼杀',0xff6600);removeEnemy(i);continue;}
        updateEnemyHP(e); }
    }

    // 典韦「灼烧光环」：与典韦亲兵同格(或强化范围内)持续灼烧——dianweiBurnDps 刷新式单值，不可叠加
    if(e.dianweiBurnUntil && now < e.dianweiBurnUntil && (e.dianweiBurnDps||0)>0){
      const dwdmg=resDmg(e.dianweiBurnDps*(app.ticker.deltaMS/1000),'法术',e.armType);
      e.hp-=dwdmg; trackDmg('dianwei','典韦',dwdmg);
      if(!e._burnVfx || now-e._burnVfx>450){ e._burnVfx=now; spawnFloat(e.x,e.y-8,'🔥',0xff4400); }
      if(e.hp<=0){
        spawnFloat(e.x,e.y-12,'灼杀',0xff4400);
        if(globalBuffs.fireZone_dianwei){   // 烈焰：灼杀落地火区（格对齐）
          const fzQ=Math.round((e.x-cx)/HEX_COL), fzR=Math.round((e.y-cy)/HEX_ROW-fzQ*0.5);
          const fzX=HEX_COL*fzQ+cx, fzY=HEX_ROW*(fzR+fzQ*0.5)+cy;
          const fzGfx=new PIXI.Graphics(); fzGfx.x=fzX; fzGfx.y=fzY; projC.addChild(fzGfx);
          fireZones.push({ x:fzX, y:fzY, r:HEX_SIZE, life:5000, maxLife:5000, gfx:fzGfx, dps:e.dianweiBurnDps*0.4 });
        }
        removeEnemy(i); continue;
      }
      updateEnemyHP(e);
    }

    // 周瑜「灼烧叠层」：每层每 0.5s 持续伤害（stun不打断），层数越高烧得越快
    if(e.zhouyuBurnUntil && now < e.zhouyuBurnUntil && (e.zhouyuStacks||0)>0){
      e._zhouyuBurnTimer=(e._zhouyuBurnTimer||0)+app.ticker.deltaMS;
      if(e._zhouyuBurnTimer>=500){ e._zhouyuBurnTimer=0;
        const zdmg=(e.zhouyuBurnDmg||0)*e.zhouyuStacks;
        e.hp-=zdmg; trackDmg('zhouyu','周瑜',zdmg);
        spawnFloat(e.x,e.y-10,Math.round(zdmg)+'🔥',0xff7722);
        if(e.hp<=0){spawnFloat(e.x,e.y-12,'灼杀',0xff7722);removeEnemy(i);continue;}
        updateEnemyHP(e); }
    }

    // 诸葛亮中毒：持续伤害（stun不打断）
    if(e.poisonUntil && now < e.poisonUntil){
      e._poisonTimer=(e._poisonTimer||0)+app.ticker.deltaMS;
      if(e._poisonTimer>=500){ e._poisonTimer=0; e.hp-=e.poisonDps||0;
        spawnFloat(e.x,e.y-10,Math.round(e.poisonDps||0)+'☠',0x44ff88);
        if(e.hp<=0){spawnFloat(e.x,e.y-12,'毒杀',0x44ff88);removeEnemy(i);continue;}
        updateEnemyHP(e); }
    }

    // 减速/中毒/嘲讽持续状态环：青=减速 绿=中毒 橙=被嘲讽
    if(e.statusRing){
      const sNow = e.slowUntil && now < e.slowUntil;
      const pNow = e.poisonUntil && now < e.poisonUntil;
      const tNow = e._taunted;
      if(sNow || pNow || tNow){
        const r=e.statusRing, rr=(e.size||8)+3;
        r.clear();
        if(sNow){ r.lineStyle(2,0x66ccff,0.95); r.drawCircle(0,0,rr); }
        if(pNow){ r.lineStyle(2,0x44ff88,0.9); r.drawCircle(0,0,rr+(sNow?3:0)); }
        if(tNow){ r.lineStyle(2,0xffaa44,0.95); r.drawCircle(0,0,rr+(sNow?3:0)+(pNow?3:0)); }
        r.lineStyle(0); r._lit=true;
      } else if(e.statusRing._lit){ e.statusRing.clear(); e.statusRing._lit=false; }
    }

    // 许褚击晕/铁锁：冻结中不移动不攻击
    if(e.stunUntil && now < e.stunUntil) continue;
    if(e.rooted && e.rootUntil && now < e.rootUntil) continue;
    // 六格对齐纪律：BOSS 震地锥蓄力期间停止移动，技能范围不随移动漂移
    if(e.isBoss && e.castUntil && now < e.castUntil){ e.cont.x=e.x; e.cont.y=e.y; continue; }

    // 已到达城墙，持续攻击（蔚蓝模式）
    if(e.attacking){
      // Bug-2 fix: 吕布击退越墙保护——敌人被推入基地核心区时强制重置回ring1外侧
      // Bug-7 fix: 被击退出屏幕上方时同样重置攻击态，让敌人恢复移动
      if(e.y > cy - HEX_ROW || e.y < -HEX_SIZE * 3){
        e.attacking = false;
        e.y = Math.min(e.y, cy - HEX_ROW - HEX_SIZE); // 越墙：压回墙外沿
        e.y = Math.max(e.y, -HEX_SIZE * 2);            // 越顶：压回屏幕入口
        e.cont.x = e.x; e.cont.y = e.y;
        // fall through to movement code below
      } else {
      if(e.noAttack){ continue; } // 精英怪：只驻城不攻击，纯压迫感
      e.atkTimer = (e.atkTimer || 0) + app.ticker.deltaMS;
      const atkInterval = (globalBuffs.tauntAtkSlow_caoren && e._taunted) ? 3333 : 2000; // 曹仁镇慑：攻速-40%
      if(e.atkTimer >= atkInterval){
        e.atkTimer = 0;
        // PvP 攻城伤害封顶：pvpSpawnEnemyWave 的 waveCount 无上限（PvE 在 spawnWave 封 16），不夹会后期放大数倍击穿基地
        const _wallDmg = Math.ceil((1 + (PVP_MODE ? Math.min(waveCount,6) : waveCount) * 0.25) * (1 + (difficulty-1)*0.03));
        // GAP3: 攻击范围内有近战亲兵时优先打兵（护盾层）
        let troopTarget = null, minTD = Infinity;
        for(const tr of troops){
          if(!tr.bt || tr.bt.key !== 'advance') continue;
          const td = Math.hypot(tr.x - e.x, tr.y - e.y);
          if(td < HEX_SIZE * 2.5 && td < minTD){ minTD = td; troopTarget = tr; }
        }
        if(troopTarget){
          const troopDmg = _wallDmg;
          wallDmgAbsorbed += troopDmg;
          troopTarget.hp -= troopDmg;
          updateTroopHP(troopTarget);
          spawnFloat(troopTarget.x, troopTarget.y - 12, '-'+troopDmg, 0xff6644);
          if(troopTarget.hp <= 0){
            const ti = troops.indexOf(troopTarget);
            if(ti >= 0){ spawnFloat(troopTarget.x, troopTarget.y - 18, '阵亡', 0xff4444); removeTroop(ti); }
          }
        } else {
          baseHP -= _wallDmg;
          shake=2; wallFlash=6;
          if(baseHP<=0){ baseHP=0; endGame(); }
          updateHUD();
        }
      }
      continue;
      } // end else (normal attacking)
    }

    // 曹仁亲兵嘲讽：亲兵周围一圈内敌人转向曹仁亲兵（强化后两圈）
    let moveX = cx, moveY = cy;
    let taunted = false;
    if(!e.immuneTaunt){
      for(const tr of troops){
        if(tr.srcName!=='曹仁' || !tr._tauntActive) continue;   // 嘲讽激活期间才吸引
        const trN = (tr.gen && tr.gen.key==='caoren' && globalBuffs.tauntRangeMul_caoren) ? 2 : 1; // 扩范围强化仅本体(Lv4出将)生效，亲兵恒1圈
        if(hexDistance(e.x,e.y,tr.x,tr.y) <= trN){ moveX = tr.x; moveY = tr.y; taunted = true; e._taunted=true; break; }
      }
    }
    // 近战亲兵攻击吸引仇恨：受击后跟随目标亲兵2.5秒
    if(!taunted && e.aggroTroop && now < e.aggroUntil && troops.indexOf(e.aggroTroop)>=0){
      moveX = e.aggroTroop.x; moveY = e.aggroTroop.y; taunted = true;
    }
    // 普通近战亲兵：1格常驻软仇恨（非曹仁专属嘲讽，弱吸引，无视觉标记）
    if(!taunted){
      for(const tr of troops){
        if(tr.bt && tr.bt.key==='advance' && tr.srcName!=='曹仁'){
          if(hexDistance(e.x,e.y,tr.x,tr.y)<=1){ moveX=tr.x; moveY=tr.y; taunted=true; break; }
        }
      }
    }

    if(taunted){
      if(Math.hypot(moveX-e.x,moveY-e.y)<18) continue;
      const _twp=nextStepCenter(e.x,e.y,moveX,moveY);
      const dx=_twp.x-e.x, dy=_twp.y-e.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<0.5) continue;
      const slowDebuff = (e.slowUntil && now < e.slowUntil) ? Math.max(e.isBoss?0.5:0.15, e.slowFactor) : 1;
      const spd=e.speed*slowDebuff*dt*0.7;
      e.x+=dx/dist*spd; e.y+=dy/dist*spd;
      e.cont.x=e.x; e.cont.y=e.y;
      continue;
    }

    if(!taunted){
      e._taunted=false;
      // PvP 敌兵抢矿：背负采矿任务者优先扑向目标矿；目标被己方拿下/消失/被玩家近身争夺/超时则卸任务转回推基
      if(PVP_MODE && e.mineTarget){
        const mt = e.mineTarget;
        const contested = troops.some(p=>Math.hypot(p.x-mt.px,p.y-mt.py) < HEX_SIZE*1.6);
        if(mt.owner === 'enemy' || goldMines.indexOf(mt) < 0 || contested || (e._mineSince && now - e._mineSince > 6000)){
          e.mineTarget = null; e._mineSince = 0;
        } else {
          if(!e._mineSince) e._mineSince = now;
          moveX = mt.px; moveY = mt.py;
        }
      }
      if(!(PVP_MODE && e.mineTarget)){
        // 三路推进：汇聚线以上沿本路直下，之后汇聚向基地
        if(e.y < LANE_MERGE_Y){ moveX = (e.laneX!=null ? e.laneX : cx); moveY = cy; }
        else { moveX = cx; moveY = cy; }
      }
    }
    // 检查是否到达城墙边沿——找最近有效建筑格再推回边沿，跳过merged空格
    let nearCell=null, nearCD=Infinity;
    for(const c of hexCells){
      if(c.state==='locked') continue;
      const cd = Math.sqrt((e.x-c.px)**2+(e.y-c.py)**2);
      if(cd < HEX_SIZE + (e.size||8) + 4 && cd < nearCD){ nearCD=cd; nearCell=c; }
    }
    if(nearCell && !(PVP_MODE && e.mineTarget)){
      if(e.isBoss && bossArrivalHp < 0) bossArrivalHp = baseHP;
      if(e.isBoss) e.hasArrived = true;   // BOSS 抵达即锁存围城：基地升级扩墙把BOSS包入墙内也不解除攻城（修exploit）
      e.attacking = true;
      e.atkTimer = 0;
      const minDist = HEX_SIZE + (e.size||8) + 2;
      if(nearCD < minDist && nearCD > 0.1){
        const angle = Math.atan2(e.y - nearCell.py, e.x - nearCell.px);
        e.x = nearCell.px + Math.cos(angle) * minDist;
        e.y = nearCell.py + Math.sin(angle) * minDist;
        e.cont.x = e.x; e.cont.y = e.y;
      }
    }
    if(e.attacking) continue;

    // 正常移动（沿六边形格航点推进，X夹限位兜底）
    const _ewp=nextStepCenter(e.x,e.y,moveX,moveY);
    const dx=_ewp.x-e.x, dy=_ewp.y-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist < 1) continue;
    const slowDebuff = (e.slowUntil && now < e.slowUntil) ? Math.max(e.isBoss?0.5:0.15, e.slowFactor) : 1;
    const spd=e.speed*slowDebuff*dt*0.7;
    e.x+=dx/dist*spd; e.y+=dy/dist*spd;
    e.cont.x=e.x; e.cont.y=e.y;
    // PvP 领地占领：敌方士兵走过的格标记为敌方
    if(PVP_MODE && e.isPvpTroop) pvpOccupyAt(e.x, e.y, 'enemy');
    // 路障限位：汇聚线以上禁止穿越障碍带（使敌人绕路推进）；PvP 采矿兵放行以触及侧翼矿
    if(e.y < LANE_MERGE_Y && !e.mineTarget){
      const bW=8;
      if(e.laneX <= LANES[0]) e.x=Math.min(e.x, LANE_BOUNDS[0]-bW);
      else if(e.laneX >= LANES[2]) e.x=Math.max(e.x, LANE_BOUNDS[1]+bW);
      else { e.x=Math.max(LANE_BOUNDS[0]+bW, Math.min(e.x, LANE_BOUNDS[1]-bW)); }
      e.cont.x=e.x;
    }
  }

  // ===== BOSS 攻击：普攻(单体击退) + 技能(锥形≤4击退)，分开避免AOE废掉整片进攻兵营 =====
  if(boss){
    // 普攻：每 ~3.5s 选范围内最近 1 个亲兵/士兵击退（单体）
    boss.basicTimer = (boss.basicTimer||0) + app.ticker.deltaMS;
    if(boss.basicTimer >= 3500){
      boss.basicTimer = 0;
      // Bug-6 fix: 优先找中路近战亲兵（低等级近战将吸引力弱，给其创造存在感）
      const meleeTroops = troops.filter(t => Math.abs(t.x - boss.x) < HEX_SIZE * 4 && t.y > boss.y);
      let bt = meleeTroops.length > 0 ? meleeTroops.reduce((a,b) => a.y < b.y ? a : b) : null;
      if(!bt){
        // 无近战亲兵：原有逻辑，找范围内最近亲兵
        let bd=Infinity;
        for(const t of troops){ const d=Math.sqrt((t.x-boss.x)**2+(t.y-boss.y)**2); if(d<HEX_SIZE*5 && d<bd){bd=d;bt=t;} }
      }
      if(bt){
        const kdx=bt.x-boss.x, kdy=bt.y-boss.y, kd=Math.sqrt(kdx*kdx+kdy*kdy)||1;
        bt.x += (kdx/kd)*HEX_SIZE*2.5 + (Math.random()-0.5)*14;
        bt.y += (kdy/kd)*HEX_SIZE*2.5 + (Math.random()-0.5)*14;
        bt.y = Math.min(bt.y, TROOP_Y_FLOOR);
        bt.cont.x=bt.x; bt.cont.y=bt.y; bt.atkTimer=0;
        spawnProjectile(boss.x, boss.y, bt.x, bt.y, 0xffa500, 6);
        spawnFloat(bt.x, bt.y-16, '击退', 0xffa500);
      } else {
        // 无亲兵可击退：直接攻城，迫使纯防守也感受到 BOSS 压迫
        baseHP = Math.max(0, baseHP - 15);
        updateHUD(); shake=Math.max(shake,5);
        spawnProjectile(boss.x, boss.y, cx, cy-20, 0xff4400, 8);
        spawnFloat(cx, cy-36, '⚔ 攻城 -15', 0xff4400);
        if(baseHP<=0){ baseHP=0; endGame(); }
      }
    }
    // 技能：每 8s 朝基地方向锥形震地波
    boss.skillTimer = (boss.skillTimer||0) + app.ticker.deltaMS;
    if(boss.skillTimer >= 8000 && !bossAoe){
      boss.skillTimer = 0;
      const _oc = pixelToHexCenter(boss.x, boss.y);   // 六格对齐：锁定开蓄力瞬间的格心，锥不再随移动漂移
      bossAoe = { phase:'warn', timer:0, radius:HEX_ROW*2, half:Math.PI/3, cap:4, ox:_oc.x, oy:_oc.y, gfx:new PIXI.Graphics() };
      boss.castUntil = now + 800;                      // 蓄力期间停止移动（见移动循环停移判断）
      projC.addChild(bossAoe.gfx);
      spawnFloat(_oc.x, _oc.y-44, '⚠ 曹操·震地锥', 0xffa500);
      blip(90,0.5,'sawtooth',0.2);
    }
    // BOSS 攻城时钟：每 6s 直接扣城墙，不依赖亲兵存在性；hasArrived 锁存防"扩墙包墙内"免疫
    if(boss.attacking || boss.hasArrived){
      boss.wallTimer = (boss.wallTimer||0) + app.ticker.deltaMS;
      if(boss.wallTimer >= 6000){
        boss.wallTimer = 0;
        const siege = Math.ceil(24 * (1 + (difficulty-1)*0.06));   // 破城伤害（含难度缩放），加强威慑
        baseHP = Math.max(0, baseHP - siege);
        updateHUD(); shake=Math.max(shake,12);
        spawnProjectile(boss.x, boss.y, cx, cy-20, 0xff2200, 12);
        spawnFloat(cx, cy-40, '⚔ 曹操·破城 -'+siege, 0xff2200, {fontSize:17});
        if(baseHP <= 0){ baseHP = 0; endGame(); }
      }
    }
  }
  if(bossAoe){
    const g=bossAoe.gfx; g.clear();
    bossAoe.timer += app.ticker.deltaMS;
    const dirA = Math.PI/2; // 朝下=基地方向
    const Rhex = 2;         // 震地锥纵深=2 圈格
    // 锥内格：朝基地方向 ±60° 的 1~2 圈格 —— 显示与判定共用同一集合
    const coneCells = boss ? hexDiskOffsets(Rhex).filter(o=>{
      if(o.dx===0&&o.dy===0) return false;
      let diff=Math.abs(Math.atan2(o.dy,o.dx)-dirA); if(diff>Math.PI) diff=2*Math.PI-diff;
      return diff <= bossAoe.half;
    }) : [];
    if(!boss){ projC.removeChild(g); bossAoe=null; }   // boss已死，清掉残留
    else if(bossAoe.phase==='warn'){
      // 蓄力 0.8s：逐格点亮朝基地方向的震地格，提示影响范围
      const p = Math.min(1, bossAoe.timer/800);
      const fa = (0.10+0.18*p) * (0.6+0.4*Math.abs(Math.sin(bossAoe.timer/80)));
      for(const o of coneCells){
        const hx=bossAoe.ox+o.dx, hy=bossAoe.oy+o.dy;
        g.beginFill(0xffa500, fa); g.drawPolygon(hexPoly(hx,hy,HEX_SIZE-2)); g.endFill();
        g.lineStyle(2, 0xffcc55, 0.5+0.4*p); g.drawPolygon(hexPoly(hx,hy,HEX_SIZE-2)); g.lineStyle(0);
      }
      if(bossAoe.timer >= 800){
        bossAoe.phase='blast'; bossAoe.timer=0;
        blip(150,0.4,'square',0.22); shake=Math.max(shake,9);
        // 爆发：锥内格按格距离近的优先，最多击退 cap 个亲兵/士兵（不死亡只打断）
        const inCone = [];
        for(const t of troops){
          const hd=hexDistance(bossAoe.ox,bossAoe.oy,t.x,t.y);
          if(hd<1 || hd>Rhex) continue;
          let diff=Math.abs(Math.atan2(t.y-bossAoe.oy,t.x-bossAoe.ox)-dirA); if(diff>Math.PI) diff=2*Math.PI-diff;
          if(diff <= bossAoe.half) inCone.push({t,d:hd});
        }
        inCone.sort((a,b)=>a.d-b.d);
        for(let k=0;k<Math.min(bossAoe.cap,inCone.length);k++){
          const t=inCone[k].t;
          const kdx=t.x-bossAoe.ox, kdy=t.y-bossAoe.oy, kd=Math.sqrt(kdx*kdx+kdy*kdy)||1;
          t.x += (kdx/kd)*HEX_SIZE*3 + (Math.random()-0.5)*22;
          t.y += (kdy/kd)*HEX_SIZE*3 + (Math.random()-0.5)*22;
          t.y = Math.min(t.y, TROOP_Y_FLOOR);
          t.cont.x=t.x; t.cont.y=t.y; t.atkTimer=0;
          spawnFloat(t.x,t.y-16,'⟲击退',0xffa500);
        }
      }
    } else {
      // 爆发余波 ~0.35s：锥内格亮闪后渐隐
      const p = Math.min(1, bossAoe.timer/350);
      g.lineStyle(0);
      for(const o of coneCells){
        g.beginFill(0xfff0c0, 0.5*(1-p)); g.drawPolygon(hexPoly(bossAoe.ox+o.dx, bossAoe.oy+o.dy, HEX_SIZE-2)); g.endFill();
      }
      if(bossAoe.timer >= 350){ projC.removeChild(g); bossAoe=null; }
    }
  }

  // ⑥ 典韦「灼烧光环」：已移回亲兵循环（格步进版），见下方 troop ticker dianwei 段

  // ⑥b 典韦「燃地」陷阱：持续减速+灼烧
  for(let fi=fireZones.length-1;fi>=0;fi--){
    const fz=fireZones[fi];
    fz.life -= app.ticker.deltaMS;
    if(fz.life <= 0){ projC.removeChild(fz.gfx); fireZones.splice(fi,1); continue; }
    // 视觉：单格六边形燃地，随时间渐暗
    const fa = fz.life/fz.maxLife;
    fz.gfx.clear();
    fz.gfx.beginFill(0xff3300, fa * 0.35); fz.gfx.drawPolygon(hexCorners(fz.r)); fz.gfx.endFill();
    fz.gfx.lineStyle(2.5, 0xff6600, Math.min(fa * 1.5, 0.9)); fz.gfx.drawPolygon(hexCorners(fz.r)); fz.gfx.lineStyle(0);
    // 伤害+减速范围内敌人
    const fzDmg = fz.dps * (app.ticker.deltaMS/1000);
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(sameHexCell(e.x,e.y,fz.x,fz.y)){
        const _fzd=resDmg(fzDmg,'法术',e.armType); e.hp-=_fzd; trackDmg('dianwei','典韦',_fzd); e.slowFactor=fz.slowFactor||0.6; e.slowUntil=now+500;
        if(e.hp<=0){spawnFloat(e.x,e.y-12,'燃地杀',0xff5500);removeEnemy(i);}
        else{updateEnemyHP(e);}
      }
    }
  }

  // ⑥b2 司马懿·雷暴区：持续伤害
  for(let si=stormZones.length-1;si>=0;si--){
    const sz=stormZones[si];
    sz.life-=app.ticker.deltaMS;
    if(sz.life<=0){ projC.removeChild(sz.gfx); stormZones.splice(si,1); continue; }
    const sa=sz.life/sz.maxLife;
    sz.gfx.clear();
    sz.gfx.beginFill(0x2244cc,sa*0.28); sz.gfx.drawPolygon(hexPoly(0,0,HEX_SIZE-2)); sz.gfx.endFill();
    sz.gfx.lineStyle(2,0x88aaff,Math.min(sa*1.4,0.85)); sz.gfx.drawPolygon(hexPoly(0,0,HEX_SIZE-2)); sz.gfx.lineStyle(0);
    if(sz.expanded){
      const r1o=[[0,-HEX_ROW],[HEX_COL,-HEX_ROW*0.5],[HEX_COL,HEX_ROW*0.5],[0,HEX_ROW],[-HEX_COL,HEX_ROW*0.5],[-HEX_COL,-HEX_ROW*0.5]];
      for(const [ox,oy] of r1o){
        sz.gfx.beginFill(0x1133aa,sa*0.15); sz.gfx.drawPolygon(hexPoly(ox,oy,HEX_SIZE-2)); sz.gfx.endFill();
        sz.gfx.lineStyle(1,0x66aaff,sa*0.5); sz.gfx.drawPolygon(hexPoly(ox,oy,HEX_SIZE-2)); sz.gfx.lineStyle(0);
      }
    }
    const szDmg=sz.dps*(app.ticker.deltaMS/1000);
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(hexDistance(sz.x,sz.y,e.x,e.y)<=sz.Rhex){
        const _szd=resDmg(szDmg,'法术',e.armType); e.hp-=_szd; trackDmg('simayi','司马懿',_szd);
        if(e.hp<=0){spawnFloat(e.x,e.y-12,'⚡',0x88aaff);removeEnemy(i);}else{updateEnemyHP(e);}
      }
    }
  }

  // ⑥c 司马懿·天命雷暴：长间隔攻击，落雷后在目标格留下持续雷暴区
  for(const cell of hexCells){
    if(cell.state!=='revealed' || !cell.general || !cell.general.storm){
      if(cell.stormGfx){ worldC.removeChild(cell.stormGfx); cell.stormGfx=null; }
      continue;
    }
    if(cell.stormGfx){ worldC.removeChild(cell.stormGfx); cell.stormGfx=null; }
    const bt=B_TYPES.find(b=>b.key===cell.category);
    if(!bt) continue;
    // 攻击间隔：大幅拉长，Lv1≈4200ms，Lv4≈2000ms
    const stormInterval=Math.max(2000,5000-cell.lvl*750);
    cell._stormTimer=(cell._stormTimer||0)+app.ticker.deltaMS;
    if(cell._stormTimer>=stormInterval){
      cell._stormTimer-=stormInterval;
      const sRangeHex=towerRangeHex(cell);
      let stgt=null, sD=Infinity;
      for(const e of enemies){ const d=hexDistance(cell.px,cell.py,e.x,e.y); if(d<=sRangeHex&&d<sD){sD=d;stgt=e;} }
      if(!stgt) continue;
      const sqQ=Math.round((stgt.x-cx)/HEX_COL), sqR2=Math.round((stgt.y-cy)/HEX_ROW-sqQ*0.5);
      const strikeX=HEX_COL*sqQ+cx, strikeY=HEX_ROW*(sqR2+sqQ*0.5)+cy;
      const expanded=globalBuffs.stormExpand_simayi;
      const strikeRHex=expanded?1:0;   // 基础=落点格本身，强化=1 圈
      const dmg=bt.dps*rangedScale(cell.lvl)*cell.general.dpsMul*(globalBuffs.globalDmg||1)*0.6;
      // 落雷瞬间伤害（落点格 / 1圈）
      for(let i=enemies.length-1;i>=0;i--){
        const e=enemies[i];
        if(hexDistance(strikeX,strikeY,e.x,e.y)<=strikeRHex){
          const _sld=resDmg(dmg,cell.general.dmgType,e.armType); e.hp-=_sld; trackDmg('simayi','司马懿',_sld);
          if(e.hp<=0){spawnFloat(e.x,e.y-12,'⚡天命',0x88aaff);removeEnemy(i);}else{updateEnemyHP(e);}
        }
      }
      if(globalBuffs.stormBolt_simayi&&Math.random()<0.15){
        const boltDmg=resDmg(dmg*5,cell.general.dmgType,stgt.armType); stgt.hp-=boltDmg; trackDmg('simayi','司马懿',boltDmg);
        spawnFloat(stgt.x,stgt.y-20,'⚡落雷！',0xffee44);
        spawnProjectile(cell.px,cell.py,stgt.x,stgt.y,0xaaccff,6,6);
        const bi=enemies.indexOf(stgt); if(bi>=0&&stgt.hp<=0){removeEnemy(bi);}else if(stgt.hp>0){updateEnemyHP(stgt);}
      }
      // 移除该格旧的雷暴区（避免叠加）
      for(let si=stormZones.length-1;si>=0;si--){
        if(stormZones[si].srcCell===cell){ projC.removeChild(stormZones[si].gfx); stormZones.splice(si,1); }
      }
      // 创建持续雷暴区（持续时间=攻击间隔）
      const szGfx=new PIXI.Graphics(); szGfx.x=strikeX; szGfx.y=strikeY; projC.addChild(szGfx);
      const zoneDps=dmg/stormInterval*800; // 间隔内总伤≈落雷的0.8倍
      stormZones.push({ x:strikeX, y:strikeY, Rhex:strikeRHex, life:stormInterval, maxLife:stormInterval, gfx:szGfx, dps:zoneDps, expanded:expanded, srcCell:cell });
      // 落雷连接线（快速闪现）
      const boltL=new PIXI.Graphics(); boltL.lineStyle(2,0x88aaff,0.8); boltL.moveTo(cell.px,cell.py); boltL.lineTo(strikeX,strikeY); projC.addChild(boltL);
      addFadeAnim(projC, boltL, 300);
    }
  }

  outerCells: for(const cell of hexCells){
    if(cell.state!=='revealed') continue;
    const bt=B_TYPES.find(b=>b.key===cell.category);
    if(!bt) continue;
    const gen = cell.general;
    const isGeneral = cell.lvl >= TUNE.maxLvl && gen;
    // 司马懿·天命雷暴：在独立循环中处理，跳过标准攻击流程
    if(gen && gen.storm) continue outerCells;
    const ck=cell.q+','+cell.r;
    const cd=attackTimers[ck]||0;
    const spdMul = (isGeneral ? gen.spdMul : 1) * (globalBuffs.globalAtkSpd || 1);
    const atkInterval = cell.category==='advance' ? Math.max(3000, 6000 - cell.lvl*1000) : 1100 / ((1 + cell.lvl*0.7) * spdMul);
    if(now-cd < atkInterval) continue;

    const rangeHex = towerRangeHex(cell);   // 射程＝整数格，与选中时显示的射程格完全一致
    // A案角色分工：远程单体将打最远(后排狙击)，近战/连锁将(庞统)/叠层将(周瑜)保持最近(护前线/不破坏连锁/聚焦叠层)
    const wantFar = (cell.category!=='advance') && !(isGeneral && (gen.chain || gen.burnStack));
    let target=null, pickD=wantFar?-Infinity:Infinity, bossT=null, bossD=Infinity;
    for(const e of enemies){
      const d=hexDistance(cell.px,cell.py,e.x,e.y);   // 六边形格距离
      if(d>rangeHex) continue;
      if(e.isBoss){ if(d<bossD){ bossD=d; bossT=e; } }      // boss降级为兜底目标
      else if(wantFar ? d>pickD : d<pickD){ pickD=d; target=e; }
    }
    if(!target) target=bossT; // 仅当无小怪可打时才直接打boss
    // 司马懿「狼顾」：无目标时蓄力累积
    if(!target && isGeneral && gen && gen.key==='simayi' && globalBuffs.chargeStrike_simayi){
      attackTimers[ck+'_charge'] = Math.min((attackTimers[ck+'_charge']||1)+0.05*dt, 4);
    }
    // ── 进攻格：固定产兵，无敌时集结路口 ──
    if(cell.category === 'advance'){
      attackTimers[ck]=now;
      // Lv4：武将在外时才持续产普通兵，武将复活倒计时中跳过
      if(isGeneral && !cell.generalOut){ continue outerCells; }
      if(troops.length<40){
        const dpsMul=isGeneral?gen.dpsMul:1,dmgMul=globalBuffs.globalDmg||1;
        const dmg=bt.dps*meleeScale(cell.lvl)*dpsMul*dmgMul;
        // Lv1→1兵, Lv2→2兵, Lv3→3兵; Lv4：gen.multishot||1（甘宁3路，其他1）
        const spawnCount = isGeneral ? (gen.multishot||1) : Math.min(cell.lvl, 3);
        if(target){
          for(let s=0;s<spawnCount;s++){
            const tgt=s===0?target:(enemies[Math.floor(Math.random()*enemies.length)]||target);
            if(!tgt) break; spawnTroop(cell,tgt,dmg);
          }
          // 关羽「武圣」：产兵时记录时间戳，用于全军激励叠层
          if(isGeneral && gen.key==='guanyu' && globalBuffs.presenceBuff_guanyu){
            if(!globalBuffs._guanyuSpawnTimes) globalBuffs._guanyuSpawnTimes=[];
            globalBuffs._guanyuSpawnTimes.push(now);
            globalBuffs._guanyuSpawnTimes=globalBuffs._guanyuSpawnTimes.filter(t2=>now-t2<8000);
          }
        } else { spawnRallyTroop(cell,dmg); }
      }
      continue outerCells;
    }
    if(target){
      attackTimers[ck]=now;
      const dpsMul = isGeneral ? gen.dpsMul : 1;
      const dmgMul = globalBuffs.globalDmg || 1;
      let dmg = bt.dps * rangedScale(cell.lvl) * dpsMul * dmgMul;
      const shots = (isGeneral && gen.multishot) ? gen.multishot : 1;

        // 防守：站桩即时伤害 + 投射物视觉
        const projColor = isGeneral ? 0x8b6200 : bt.hex;
        const projSize = isGeneral ? gen.projSize : 3;

        // 司马懿「狼顾」蓄力：无目标时累积，命中时消费
        let simaCharge = 1;
        if(gen && gen.key==='simayi' && globalBuffs.chargeStrike_simayi){
          simaCharge = (attackTimers[ck+'_charge'] || 1);
          attackTimers[ck+'_charge'] = 1;
          if(simaCharge > 1.5) spawnFloat(cell.px, cell.py-28, '蓄力×'+simaCharge.toFixed(1), 0xddaaff);
        }

        // 黄忠「落雕散射」：多弹道（gen级即生效）
        const scatterCount = (gen && gen.key==='huangzhong' && globalBuffs.scatter_huangzhong) ? globalBuffs.scatter_huangzhong : 1;
        const scatterDmgMul = scatterCount > 1 ? 0.55 : 1;

        // 太史慈「穿云贯日」：穿透弹道（gen级即生效）
        const pierceCount = (gen && gen.key==='taishici' && globalBuffs.pierce_taishici) ? globalBuffs.pierce_taishici : 0;

        const shotsTotal = Math.max(shots, scatterCount);
        for(let s=0; s<shotsTotal; s++){
          let tgt = s===0 ? target : (enemies[Math.floor(Math.random()*enemies.length)] || target);
          if(!tgt) break;

          let finalDmg = dmg * scatterDmgMul * simaCharge;
          // 曹仁「镇慑」：被嘲讽敌人攻速-40%（在敌人攻击段处理）

          // 太史慈「鸣镝」：每4发蓄力，第5发伤害×2弹速×3
          let mingdiMaxLife = 10;
          if(gen && gen.key==='taishici' && globalBuffs.mingdi_taishici){
            attackTimers[ck+'_mingdi'] = ((attackTimers[ck+'_mingdi']||0)+1);
            if(attackTimers[ck+'_mingdi'] >= 5){ attackTimers[ck+'_mingdi']=0; finalDmg*=2; mingdiMaxLife=3; spawnFloat(cell.px,cell.py-28,'鸣镝！',0xffdd44); }
          }

          // 黄忠「百步穿心」暴击
          if(gen && gen.key==='huangzhong' && globalBuffs.critChance_huangzhong){
            if(Math.random() < globalBuffs.critChance_huangzhong){
              finalDmg *= (globalBuffs.critMul_huangzhong || 3);
              spawnFloat(tgt.x, tgt.y-18, '暴击！', 0x8b6200);
            }
          }

          // 穿透弹道（太史慈）
          if(pierceCount > 0){
            const sortedByDist = [...enemies].sort((a,b)=>Math.sqrt((a.x-cell.px)**2+(a.y-cell.py)**2)-Math.sqrt((b.x-cell.px)**2+(b.y-cell.py)**2));
            let pierceDmg = finalDmg; let hit = 0;
            for(const pe of sortedByDist){
              if(hit >= pierceCount+1) break;
              if(hexDistance(cell.px,cell.py,pe.x,pe.y) > rangeHex) break;
              pe.hp -= resDmg(pierceDmg, gen&&gen.dmgType, pe.armType);
              trackDmg(cell.building, gen&&gen.name, pierceDmg);
              spawnArrowProjectile(cell.px, cell.py, pe.x, pe.y, 0xffdd44, projSize, mingdiMaxLife);
              spawnFloat(pe.x, pe.y-10, Math.round(pierceDmg)+'', 0xffdd44);
              pierceDmg *= 0.75; // 穿透递减（每次×0.75）
              const pi=enemies.indexOf(pe);
              if(pe.hp<=0&&pi>=0){spawnFloat(pe.x,pe.y-12,'贯穿',0xffdd44);removeEnemy(pi);}else if(pe.hp>0){updateEnemyHP(pe);}
              hit++;
            }
            continue;
          }

          spawnProjectile(cell.px, cell.py, tgt.x, tgt.y, projColor, projSize, mingdiMaxLife);
          finalDmg = resDmg(finalDmg, gen&&gen.dmgType, tgt.armType); // 物法软克制
          tgt.hp -= finalDmg;
          trackDmg(cell.building, gen&&gen.name, finalDmg);

          // 诸葛亮减速+中毒（八阵延伸→目标单元格AOE；否则单体）
          if(gen && gen.slow){
            const slowVal = gen.slow;
            const isZhuge = gen.key==='zhugeliang';
            const poisonDps = isZhuge ? finalDmg * 0.2 : 0;
            // 命中处霜冻视觉：单体=小圆光点；AOE模式=多格蓝六边形（在下方 slowAoe 块绘制）
            if(isZhuge && !globalBuffs.slowAoe_zhugeliang){
              const frostG=new PIXI.Graphics(); frostG.x=tgt.x; frostG.y=tgt.y; projC.addChild(frostG);
              frostG.beginFill(0xaaeeff,0.80); frostG.drawCircle(0,0,8); frostG.endFill();
              frostG.lineStyle(2,0x66ccff,0.9); frostG.drawCircle(0,0,12);
              addFadeAnim(projC, frostG, 220);
            }
            if(globalBuffs.slowAoe_zhugeliang && isZhuge){
              const slowRHex = 1;   // 减速AOE：以目标格为中心 1 圈
              // 显性范围视觉：高亮波及的六边形格（与判定范围一致）
              const _sgC=pixelToHexCenter(tgt.x,tgt.y);
              const _sg=new PIXI.Graphics(); _sg.x=_sgC.x; _sg.y=_sgC.y; projC.addChild(_sg);
              for(const o of hexDiskOffsets(slowRHex)){
                _sg.beginFill(0x66ccff,0.14); _sg.drawPolygon(hexPoly(o.dx,o.dy,HEX_SIZE-2)); _sg.endFill();
                _sg.lineStyle(1.5,0xaaeeff,0.6); _sg.drawPolygon(hexPoly(o.dx,o.dy,HEX_SIZE-2)); _sg.lineStyle(0);
              }
              addFadeAnim(projC,_sg,280);
              for(const se of enemies){
                if(hexDistance(tgt.x,tgt.y,se.x,se.y) <= slowRHex){ se.slowFactor=slowVal; se.slowUntil=now+2000;
                  se.poisonUntil=now+2000; se.poisonDps=poisonDps; se._poisonTimer=0; }
              }
              spawnFloat(tgt.x, tgt.y-14, '❄☠AOE', 0x88ccff);
            } else {
              tgt.slowFactor=slowVal; tgt.slowUntil=now+2000;
              if(isZhuge){ tgt.poisonUntil=now+2000; tgt.poisonDps=poisonDps; tgt._poisonTimer=0; }
              spawnFloat(tgt.x, tgt.y-14, isZhuge?'❄☠':'❄', 0x88ccff);
            }
          }

          // 许褚击晕 + 军法（击晕传染）
          if(gen && gen.stun && Math.random()<gen.stun){
            tgt.stunUntil=now+500;
            spawnFloat(tgt.x,tgt.y-18,'💫晕',0xffffff);
            if(globalBuffs.stunSpread_xuchu){
              const spreadRHex=2;
              for(const se of enemies){ if(se===tgt) continue;
                if(hexDistance(tgt.x,tgt.y,se.x,se.y)<=spreadRHex&&Math.random()<0.3){ se.stunUntil=now+1000; spawnFloat(se.x,se.y-14,'💫扩散',0xddddff); }
              }
            }
          }

          // 张飞AOE（霸王怒：半径扩大；火爆：灼烧标记）——六格纪律：按整格环命中，与亲兵路径(genKey判定)一致
          if(gen && gen.aoe){
            const ringN = (gen.key==='zhangfei' && globalBuffs.aoeRadiusMul_zhangfei) ? 2 : 1;
            const aoeDmg=finalDmg*0.5;
            // AOE 爆炸：按 hex 盘格绘制（弃用欧式圆，对齐六格纪律）
            const _ahc=pixelToHexCenter(tgt.x,tgt.y);
            const _ag=new PIXI.Graphics(); projC.addChild(_ag);
            for(const o of hexDiskOffsets(ringN)){
              _ag.beginFill(0xff5533,0.22); _ag.drawPolygon(hexPoly(_ahc.x+o.dx, _ahc.y+o.dy, HEX_SIZE-2)); _ag.endFill();
              _ag.lineStyle(2,0xff7744,0.85); _ag.drawPolygon(hexPoly(_ahc.x+o.dx, _ahc.y+o.dy, HEX_SIZE-2)); _ag.lineStyle(0);
            }
            addFadeAnim(projC, _ag, 280);
            for(let ai=enemies.length-1;ai>=0;ai--){
              const ae=enemies[ai]; if(ae===tgt) continue;
              if(hexDistance(tgt.x,tgt.y,ae.x,ae.y) > ringN) continue;
              {
                ae.hp-=aoeDmg; spawnFloat(ae.x,ae.y-10,Math.round(aoeDmg)+'',0xff5a5a);
                trackDmg(cell.building, gen&&gen.name, aoeDmg);
                if(globalBuffs.aoeBurn_zhangfei && gen.key==='zhangfei'){
                  ae.zhangfeiBurnUntil=now+2000; ae._burnDmg=aoeDmg*0.3; ae._burnTimer=0;
                }
                if(ae.hp<=0){const aei=enemies.indexOf(ae);if(aei>=0){spawnFloat(ae.x,ae.y-12,'溅杀',0xff5a5a);removeEnemy(aei);}}else{updateEnemyHP(ae);}
              }
            }
          }

          // 庞统·连环雷击：以最近敌人为起点，依次跳到攻击范围内最远的目标
          if(gen && gen.key==='pangtong' && gen.chain){
            const chainCount=gen.chain;
            // tgt 已是最近目标（已命中），从 tgt 出发跳到 range 内最远，依次循环
            const chainHit=new Set([tgt]);
            let cSrc=tgt;
            const chainTargets=[tgt]; // [0]=tgt已伤害，[1+]=后续链式目标
            for(let step=1;step<chainCount;step++){
              let farthest=null, farthestD=0;
              for(const e of enemies){
                if(chainHit.has(e)) continue;
                const d=hexDistance(cSrc.x,cSrc.y,e.x,e.y);
                if(d<=rangeHex && d>farthestD){ farthestD=d; farthest=e; }
              }
              if(!farthest) break;
              chainHit.add(farthest); chainTargets.push(farthest); cSrc=farthest;
            }
            const cgfx=new PIXI.Graphics(); projC.addChild(cgfx);
            const flashes=[];
            let prevSrc={x:cell.px,y:cell.py};
            for(let hitIdx=0;hitIdx<chainTargets.length;hitIdx++){
              const cn=chainTargets[hitIdx];
              const cDmg=finalDmg*Math.pow(gen.chainDecay||0.8,hitIdx);
              if(hitIdx>0){ cn.hp-=cDmg; trackDmg(cell.building,gen.name,cDmg);
                const ni=enemies.indexOf(cn);
                if(cn.hp<=0&&ni>=0){spawnFloat(cn.x,cn.y-12,'⚡连击',0x66ccff);removeEnemy(ni);}else{updateEnemyHP(cn);}
              }
              cgfx.lineStyle(1+hitIdx*0.5,0x66ccff,0.85);
              cgfx.moveTo(prevSrc.x,prevSrc.y); cgfx.lineTo(cn.x,cn.y);
              if(globalBuffs.boltExplode_pangtong){
                const hc=pixelToHexCenter(cn.x,cn.y);
                const fg=new PIXI.Graphics(); fg.x=hc.x; fg.y=hc.y; projC.addChild(fg);
                fg.beginFill(0x66ccff,0.42); fg.drawPolygon(hexCorners(HEX_SIZE-2)); fg.endFill();
                fg.lineStyle(2.5,0xaaeeff,0.95); fg.drawPolygon(hexCorners(HEX_SIZE-2));
                flashes.push(fg);
                for(let ei=enemies.length-1;ei>=0;ei--){
                  const ae=enemies[ei]; if(chainHit.has(ae)) continue;
                  if(sameHexCell(ae.x,ae.y,hc.x,hc.y)){
                    ae.hp-=cDmg*0.5; trackDmg(cell.building,gen.name,cDmg*0.5);
                    spawnFloat(ae.x,ae.y-8,Math.round(cDmg*0.5)+'',0x66ccff);
                    if(ae.hp<=0){const aei=enemies.indexOf(ae);if(aei>=0){spawnFloat(ae.x,ae.y-12,'连爆',0x66ccff);removeEnemy(aei);}}else{updateEnemyHP(ae);}
                  }
                }
              }
              prevSrc=cn;
            }
            addFadeAnim(projC, [cgfx, ...flashes], 300);
          }

          // 周瑜·灼烧叠层：普攻命中叠 1 层灼烧（持续DOT），满 igniteAt 层引爆范围真伤
          if(gen && gen.burnStack){
            const igniteAt = (globalBuffs.igniteFast_zhouyu ? (gen.igniteAt||5)-1 : (gen.igniteAt||5));
            tgt.zhouyuStacks = (tgt.zhouyuStacks||0) + 1;
            tgt.zhouyuBurnUntil = now + 3000;
            tgt.zhouyuBurnDmg = finalDmg * 0.18;   // 每层每 0.5s 的灼烧基数
            spawnFloat(tgt.x, tgt.y-16, '🔥×'+tgt.zhouyuStacks, 0xff7722);
            if(tgt.zhouyuStacks >= igniteAt){
              tgt.zhouyuStacks = 0; tgt.zhouyuBurnUntil = 0;   // 引爆清零，tgt 击杀仍走外层统一路径
              const igniteDmg = igniteAt * finalDmg * 0.6;
              const igniteR = HEX_SIZE * (globalBuffs.igniteRadius_zhouyu ? 3 : 2);
              const _bg=new PIXI.Graphics(); _bg.lineStyle(3,0xff5500,0.9); _bg.drawCircle(0,0,igniteR);
              _bg.beginFill(0xff7700,0.20); _bg.drawCircle(0,0,igniteR); _bg.endFill(); _bg.x=tgt.x; _bg.y=tgt.y; projC.addChild(_bg);
              addFadeAnim(projC, _bg, 280, t=>_bg.scale.set(Math.min(1, 0.45+t/140)));   // 弹到实际伤害半径(igniteR)即止，不超范围
              spawnFloat(tgt.x, tgt.y-22, '爆燃!', 0xff5500);
              for(let bi=enemies.length-1;bi>=0;bi--){
                const be=enemies[bi]; if(be===tgt) continue;
                const bd=Math.sqrt((be.x-tgt.x)**2+(be.y-tgt.y)**2);
                if(bd<=igniteR){
                  be.hp-=igniteDmg; trackDmg(cell.building, gen.name, igniteDmg);
                  be.zhouyuStacks=0; be.zhouyuBurnUntil=0;
                  spawnFloat(be.x,be.y-12,Math.round(igniteDmg)+'💥',0xff5500);
                  if(be.hp<=0){const bei=enemies.indexOf(be);if(bei>=0){spawnFloat(be.x,be.y-14,'灼爆',0xff5500);removeEnemy(bei);}}else{updateEnemyHP(be);}
                }
              }
            }
          }

          if(tgt.hp<=0){
            const idx=enemies.indexOf(tgt);
            if(idx>=0){spawnFloat(tgt.x,tgt.y-12,gen?gen.name+'击破':'击破',0x8b6200);removeEnemy(idx);}
          } else { updateEnemyHP(tgt); }
        }
    }
  }

  // ⑦ 少年基地普攻（随等级提升范围/伤害）
  if(shaoNianAtk && enemies.length > 0 && !gameOver){
    const baseCell = baseCellRef;
    if(baseCell){
      shaoNianAtk.timer += app.ticker.deltaMS;
      const atkInterval = 1500 * shaoNianAtk.spdMul;
      if(shaoNianAtk.timer >= atkInterval){
        shaoNianAtk.timer = 0;
        const rangeHex = Math.max(1, Math.round(HEX_SIZE * (3.5 + baseLvl * 0.5) * shaoNianAtk.rangeMul / HEX_ROW));
        const dmg = (4 + baseLvl * 3) * shaoNianAtk.dmgMul;
        const inRange = enemies.filter(e2=>hexDistance(baseCell.px,baseCell.py,e2.x,e2.y)<=rangeHex);
        inRange.sort((a2,b2)=>Math.sqrt((a2.x-baseCell.px)**2+(a2.y-baseCell.py)**2)-Math.sqrt((b2.x-baseCell.px)**2+(b2.y-baseCell.py)**2));
        let hitCount=0;
        for(const st of inRange){
          if(hitCount >= shaoNianAtk.targets) break;
          st.hp -= dmg;
          trackDmg('shaonian','少年',dmg);
          spawnProjectile(baseCell.px, baseCell.py, st.x, st.y, 0x8b6200, 3);
          const sei=enemies.indexOf(st);
          if(st.hp<=0&&sei>=0){spawnFloat(st.x,st.y-14,'少年击破',0x8b6200);removeEnemy(sei);}
          else if(st.hp>0){updateEnemyHP(st);}
          hitCount++;
        }
      }
    }
  }

  // ⑧ Lv4进攻将领冠军出征
  for(const cell of hexCells){
    if(cell.state!=='revealed' || cell.category!=='advance' || cell.lvl < TUNE.maxLvl) continue;
    const gen=cell.general; if(!gen) continue;
    if(cell.generalRespawnTimer > 0){
      cell.generalRespawnTimer -= app.ticker.deltaMS;
      if(cell.generalRespawnTimer < 0) cell.generalRespawnTimer = 0;
      // 弧线倒计时显示
      if(!cell.timerArc){
        cell.timerArc=new PIXI.Graphics();
        cell.timerText=new PIXI.Text('',{fontSize:10,fill:'#8b6200',fontWeight:'800',stroke:'#f7efda',strokeThickness:2.5});
        cell.timerText.anchor.set(0.5);
        cell.cont.addChild(cell.timerArc); cell.cont.addChild(cell.timerText);
      }
      const pct=cell.generalRespawnTimer/5000;
      cell.timerArc.clear();
      cell.timerArc.lineStyle(3,0x8b6200,0.75);
      cell.timerArc.arc(0,0,HEX_SIZE-5,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);
      cell.timerText.text=Math.ceil(cell.generalRespawnTimer/1000)+'s';
    } else if(cell.timerArc){
      cell.cont.removeChild(cell.timerArc); cell.timerArc=null;
      if(cell.timerText){ cell.cont.removeChild(cell.timerText); cell.timerText=null; }
    }
    if(!cell.generalOut && cell.generalRespawnTimer <= 0){
      if(cell.timerArc){ cell.cont.removeChild(cell.timerArc); cell.timerArc=null; }
      if(cell.timerText){ cell.cont.removeChild(cell.timerText); cell.timerText=null; }
      cell.generalOut = true;
      const bt=B_TYPES.find(b=>b.key===cell.category);
      const dpsMul = gen.dpsMul;
      const dmg = bt.dps * meleeScale(cell.lvl) * dpsMul * (globalBuffs.globalDmg||1);
      let tgt=null, minD=Infinity, btg=null, btd=Infinity;
      for(const e of enemies){ const d=Math.sqrt((e.x-cell.px)**2+(e.y-cell.py)**2); if(e.isBoss){ if(d<btd){btd=d;btg=e;} } else if(d<minD){minD=d;tgt=e;} }
      if(!tgt) tgt=btg; // boss兜底
      if(tgt) spawnGeneralTroop(cell, tgt, dmg);
      else spawnRallyTroop(cell, dmg);
    }
  }

  for(let i=troops.length-1;i>=0;i--){
    const t=troops[i];
    // PvP 玩家采矿兵：单线奔向目标矿占领；遇争夺(矿被敌兵近身)/超时/到手/消失即卸任务转回作战
    if(PVP_MODE && t.mineTarget){
      const mt=t.mineTarget;
      const contested = enemies.some(e=>e.isPvpTroop && Math.hypot(e.x-mt.px,e.y-mt.py) < HEX_SIZE*1.6);
      if(mt.owner==='player' || goldMines.indexOf(mt)<0 || contested || (t._mineSince && now - t._mineSince > 6000)){
        t.mineTarget=null; t._mineSince=0;   // 卸任务 → 落入下方正常推进/作战逻辑
      } else {
        if(!t._mineSince) t._mineSince=now;
        const _mg=pvpDetourGoal(t, mt.px, mt.py);
        const _mwp=nextStepCenter(t.x,t.y,_mg.x,_mg.y);
        const _mdx=_mwp.x-t.x, _mdy=_mwp.y-t.y, _ml=Math.hypot(_mdx,_mdy)||1;
        const _mspd=(t.bt&&t.bt.troopSpd||0.25)*(t.moveSpdMul||1)*dt;
        t.x+=_mdx/_ml*_mspd; t.y+=_mdy/_ml*_mspd; t.cont.x=t.x; t.cont.y=t.y;
        pvpOccupyAt(t.x, t.y, 'player');
        continue;
      }
    }
    // 曹仁嘲讽：3s CD，激活后持续1.5s；视觉圆环跟随激活状态触发
    if(t.srcName==='曹仁'){
      const N = (t.gen && t.gen.key==='caoren' && globalBuffs.tauntRangeMul_caoren) ? 2 : 1;
      let anyInRange=false;
      for(const e of enemies){ if(hexDistance(t.x,t.y,e.x,e.y)<=N){ anyInRange=true; break; } }
      const _tnow=performance.now();
      // 嘲讽CD管理：3s CD，触发后激活1.5s
      if(anyInRange && (!t._tauntCd || _tnow-t._tauntCd>=3000)){ t._tauntCd=_tnow; t._tauntActive=true; }
      if(t._tauntActive && t._tauntCd && _tnow-t._tauntCd>=1500) t._tauntActive=false;
      if(anyInRange && t._tauntActive && (!t._tauntAnimAt || _tnow-t._tauntAnimAt>3000)){
        t._tauntAnimAt=_tnow;
        const rg=new PIXI.Graphics(); rg.x=t.x; rg.y=t.y; projC.addChild(rg);
        addFadeAnim(projC, rg, 600, (et, alpha)=>{
          rg.clear();
          const r=N*HEX_SIZE*(1+et/600*0.4);
          rg.lineStyle(2.5, 0xffaa44, alpha*0.9);
          rg.drawCircle(0, 0, r);
        });
      }
      if(t._tauntGfx){ t._tauntGfx.clear(); }
    }
    // 集结模式：向集结点前进，三圈内有敌再出击
    if(t.rallying){
      if(PVP_MODE){
        t.rallying = false; // PvP：立即解除集结，向敌方基地推进
      } else if(enemies.length>0){
        const alertR = HEX_SIZE * 6; // 3圈警戒半径
        if(enemies.some(e=>Math.sqrt((e.x-t.x)**2+(e.y-t.y)**2)<alertR)) t.rallying=false;
        else {
          // 无近敌：仍向集结点前进，不追击远敌
          const rdx=t.rallyX-t.x, rdy=t.rallyY-t.y;
          const rdist=Math.sqrt(rdx*rdx+rdy*rdy);
          if(rdist>5){
            t.x+=rdx/rdist*0.25*dt; t.y+=rdy/rdist*0.25*dt;
            if(t.y < LANE_MERGE_Y - HEX_ROW * 2){
              const obsBuf=HEX_SIZE+4;
              if(t.laneIdx===0)      t.x=Math.min(t.x,LANE_BOUNDS[0]-obsBuf);
              else if(t.laneIdx===2) t.x=Math.max(t.x,LANE_BOUNDS[1]+obsBuf);
              else t.x=Math.max(LANE_BOUNDS[0]+obsBuf,Math.min(t.x,LANE_BOUNDS[1]-obsBuf));
            }
            t.cont.x=t.x; t.cont.y=t.y;
          }
          if(t.y < HEX_SIZE * 3){ t.y = HEX_SIZE * 3; t.cont.y = t.y; }
          continue;
        }
      }
      else {
        const rdx=t.rallyX-t.x, rdy=t.rallyY-t.y;
        const rdist=Math.sqrt(rdx*rdx+rdy*rdy);
        if(rdist>5){
          t.x+=rdx/rdist*0.25*dt; t.y+=rdy/rdist*0.25*dt;
          if(t.y < LANE_MERGE_Y - HEX_ROW * 2){
            const obsBuf=HEX_SIZE+4;
            if(t.laneIdx===0)      t.x=Math.min(t.x,LANE_BOUNDS[0]-obsBuf);
            else if(t.laneIdx===2) t.x=Math.max(t.x,LANE_BOUNDS[1]+obsBuf);
            else t.x=Math.max(LANE_BOUNDS[0]+obsBuf,Math.min(t.x,LANE_BOUNDS[1]-obsBuf));
          }
          t.cont.x=t.x; t.cont.y=t.y;
        }
        // Bug-1 fix: 无敌时不得超过传送门区域，防止小屏手机 rallyY 过小时上冲抖动
        if (t.y < HEX_SIZE * 3) { t.y = HEX_SIZE * 3; t.cont.y = t.y; }
        continue;
      }
    }
    if(!enemies.length){
      if(PVP_MODE){
        // PvP：无敌时向敌方基地推进
        if(t.y <= enemyCy + HEX_ROW * 3){
          // 到达敌方基地区域：攻打敌基
          t.atkTimer=(t.atkTimer||0)+app.ticker.deltaMS;
          if(t.atkTimer>=600){
            t.atkTimer=0;
            const baseDmg=Math.ceil(t.dmg||5);
            enemyBaseHP=Math.max(0,enemyBaseHP-baseDmg);
            spawnFloat(t.x,t.y-10,'-'+baseDmg,0xcc3322);
            updateHUD();
            if(enemyBaseHP<=0){ pvpWin(); return; }
          }
          continue;
        }
        // 尚未到达：继续向敌方基地行军（过水绕行，避免中路 clump）
        const _g=pvpDetourGoal(t,cx,enemyCy);
        const _wp=nextStepCenter(t.x,t.y,_g.x,_g.y);
        const _wdx=_wp.x-t.x, _wdy=_wp.y-t.y, _wl=Math.hypot(_wdx,_wdy)||1;
        const _spd=(t.bt&&t.bt.troopSpd||0.25)*(t.moveSpdMul||1)*dt;
        t.x+=_wdx/_wl*_spd; t.y+=_wdy/_wl*_spd;
        t.cont.x=t.x; t.cont.y=t.y;
        pvpOccupyAt(t.x, t.y, 'player'); // 玩家亲兵走过的格标记为玩家占领
        continue;
      }
      // 全部波次结束才清除亲兵；波次间隙让亲兵集结待命，不提前消失
      if(waveCount > 15 || gameWon){
        if(t.isGeneralTroop&&t.sourceCell){ t.sourceCell.generalOut=false; t.sourceCell.generalRespawnTimer=0; }
        removeTroop(i); continue;
      }
      if(!t.rallying){
        t.rallying = true;
        const _rLane = t.laneIdx!=null ? t.laneIdx : 1;
        t.rallyX = LANES[_rLane];
        t.rallyY = cy - HEX_ROW * 3;
      }
      continue;
    }
    let nearest=null, nd=Infinity;
    for(const e of enemies){ const d=Math.sqrt((e.x-t.x)**2+(e.y-t.y)**2); if(d<nd){nd=d;nearest=e;} }
    if(!nearest){ if(!PVP_MODE) removeTroop(i); continue; }
    const tdx=nearest.x-t.x, tdy=nearest.y-t.y;
    const tdist=Math.sqrt(tdx*tdx+tdy*tdy);

    // 典韦·灼烧光环（格步进版）：ring 0=亲兵当前格；光晕吸附格心——格内不动，跨格才跳；刷新式DOT
    if(t.genKey==='dianwei'){
      const _dtn=performance.now();
      const burnRing=globalBuffs.burnRadiusMul_dianwei?1:0;
      const burnDpsV=t.dmg*1.2*(globalBuffs.burnDpsMul_dianwei||1)*(globalBuffs.globalDmg||1);
      const {q:_cq,r:_cr}=pixelToAxial(t.x,t.y);  // 亲兵当前格轴坐标
      const _snapX=HEX_COL*_cq+cx, _snapY=HEX_ROW*(_cr+_cq*0.5)+cy;  // 格心像素
      // 共享全局 GFX 去叠加：帧首次使用时清一次，每格仅绘制一次（防多典韦叠红）
      if(_dwFrameId !== _dtn>>4){ _dwFrameId=_dtn>>4; _dwDrawnHexes.clear(); if(dianweiBurnGfx) dianweiBurnGfx.clear(); }
      const _bp=0.15+0.06*Math.sin(_dtn/240);
      for(const o of hexDiskOffsets(burnRing)){
        const _hk=`${Math.round(_snapX+o.dx)},${Math.round(_snapY+o.dy)}`;
        if(_dwDrawnHexes.has(_hk)) continue; _dwDrawnHexes.add(_hk);
        if(dianweiBurnGfx){ dianweiBurnGfx.beginFill(0xff4400,_bp); dianweiBurnGfx.drawPolygon(hexPoly(_snapX+o.dx,_snapY+o.dy,HEX_SIZE-4)); dianweiBurnGfx.endFill(); }
      }
      for(const e of enemies){
        if(hexDistance(_snapX,_snapY,e.x,e.y)>burnRing) continue;
        e.dianweiBurnUntil=_dtn+200; e.dianweiBurnDps=burnDpsV;
      }
    }

    // 关羽（普通亲兵+大将亲兵）均走下方普攻路径，普攻为主、周期附带剑气/青龙波——不再站桩远程刷屏（见普攻块periodic）

    // 亲兵移速：gen.spdMul 接入（赵云2.0→实际跑速翻倍；太史慈buff叠加）
    const baseMovSpd = t.moveSpdMul || 1;
    const troopSpdMul = baseMovSpd * ((t.gen && t.gen.key==='taishici' && globalBuffs.troopSpd_taishici) ? globalBuffs.troopSpd_taishici : 1);
    // 赵云「七进七出」：亲兵攻速×1.5 → 攻击间隔缩短
    const troopAtkInterval = (t.gen && t.gen.key==='zhaoyun' && globalBuffs.troopAtkSpd_zhaoyun) ? Math.round(400/globalBuffs.troopAtkSpd_zhaoyun) : 400;

    if(tdist>14){
      const _cg = PVP_MODE ? pvpDetourGoal(t,nearest.x,nearest.y) : {x:nearest.x,y:nearest.y};  // PvP 追击对岸敌人过水绕行
      const _twp=nextStepCenter(t.x,t.y,_cg.x,_cg.y);
      const _wdx=_twp.x-t.x, _wdy=_twp.y-t.y, _wl=Math.hypot(_wdx,_wdy)||1;
      const tBaseSpd=t.bt&&t.bt.troopSpd||0.25; t.x+=_wdx/_wl*tBaseSpd*troopSpdMul*dt; t.y+=_wdy/_wl*tBaseSpd*troopSpdMul*dt;
      t.cont.x=t.x; t.cont.y=t.y;
      if(PVP_MODE) pvpOccupyAt(t.x, t.y, 'player'); // 玩家亲兵移动占领格
      // 障碍带限位：仅在视觉障碍格存在的Y范围内限位（匹配视觉与碰撞）；PvP 无障碍格跳过
      if(!PVP_MODE && t.y < LANE_MERGE_Y - HEX_ROW * 2){
        const obsBuf=HEX_SIZE+4;
        if(t.laneIdx===0)      t.x=Math.min(t.x, LANE_BOUNDS[0]-obsBuf);
        else if(t.laneIdx===2) t.x=Math.max(t.x, LANE_BOUNDS[1]+obsBuf);
        else t.x=Math.max(LANE_BOUNDS[0]+obsBuf, Math.min(t.x, LANE_BOUNDS[1]-obsBuf));
        t.cont.x=t.x;
      }
    } else {
      t.atkTimer+=app.ticker.deltaMS;
      if(t.atkTimer>=troopAtkInterval){
        t.atkTimer=0;
        const tnow=performance.now();

        // 赵云「龙胆」：每3击×2伤害
        t._hitCount = (t._hitCount||0)+1;
        const dragonLance = (t.gen && t.gen.key==='zhaoyun' && globalBuffs.tripleStrike_zhaoyun && t._hitCount%3===0);
        // 关羽「武圣」：8秒内产兵批次×8%全军增伤（最多3层）
        const guanyuBonus = globalBuffs.presenceBuff_guanyu ? 1 + Math.min((globalBuffs._guanyuSpawnTimes||[]).filter(t2=>tnow-t2<8000).length,3)*0.08 : 1;
        const troopDmg = (dragonLance ? t.dmg*2 : t.dmg) * guanyuBonus * (globalBuffs.globalDmg||1);
        if(dragonLance) spawnFloat(nearest.x, nearest.y-20, '龙胆！', 0x44ddff);

        const _tDmgType = t.dmgType || '物理';   // 由 pushTroop 从将身派生，Lv1-3 亲兵也带正确物/法类型
        nearest.hp -= resDmg(troopDmg, _tDmgType, nearest.armType);
        // 赵云「铁血」：普攻偷血25%（龙胆大伤=大回血，A+C自然联动）
        if(t.gen && t.gen.key==='zhaoyun'){
          const healAmt=Math.round(troopDmg*0.25);
          if(healAmt>0){ t.hp=Math.min(t.maxHp, t.hp+healAmt); updateTroopHP(t); spawnFloat(nearest.x,nearest.y-14,'+'+healAmt,0x44ff88); }
        }
        trackDmg(t.srcKey, t.srcName, troopDmg);
        // 近战攻击后吸引仇恨：受击敌人转向该亲兵2.5秒
        nearest.aggroTroop=t; nearest.aggroUntil=tnow+2500;
        if(t.gen && t.gen.key==='guanyu' && globalBuffs.troopSplash_guanyu){
          const splashR = HEX_SIZE*1.8;
          for(let j=enemies.length-1;j>=0;j--){
            const ae=enemies[j]; if(ae===nearest) continue;
            const sd=Math.sqrt((ae.x-nearest.x)**2+(ae.y-nearest.y)**2);
            if(sd<splashR){
              ae.hp-=troopDmg*0.5; spawnFloat(ae.x,ae.y-8,Math.round(troopDmg*0.5)+'',0xff8844);
              trackDmg(t.srcKey, t.srcName, troopDmg*0.5);
              if(ae.hp<=0){spawnFloat(ae.x,ae.y-12,'义绝',0xff8844);removeEnemy(j);}else{updateEnemyHP(ae);}
            }
          }
        }

        // 关羽：普攻为主。普通亲兵每4击附带穿透剑气；大将亲兵每5击附带青龙波斩（均六格对齐，不再站桩远程刷屏）
        if((t.gen&&t.gen.key==='guanyu')||t.genKey==='guanyu'){
          t._slashCount=(t._slashCount||0)+1;
          if(t.isGeneralTroop){
            if(t._slashCount>=5){ t._slashCount=0; fireGuanyuWave(t, nearest, troopDmg*2.0); }
          } else {
            if(t._slashCount>=4){ t._slashCount=0; fireGuanyuBasicSlash(t, nearest, troopDmg); }
          }
        }

        if(t.gen){
          if(t.gen.slow){ nearest.slowFactor=t.gen.slow; nearest.slowUntil=tnow+2000; }
          if(t.gen.stun && Math.random()<(t.gen.stun||0.3)){
            const stunDur = 500;
            nearest.stunUntil=tnow+stunDur;
            spawnFloat(nearest.x,nearest.y-18,'💫晕',0xffffff);
            if(globalBuffs.stunSpread_xuchu){
              const spreadR=HEX_SIZE*2.5;
              for(const se of enemies){ if(se===nearest) continue;
                const sd=Math.sqrt((se.x-nearest.x)**2+(se.y-nearest.y)**2);
                if(sd<spreadR&&Math.random()<0.3){ se.stunUntil=tnow+1000; spawnFloat(se.x,se.y-14,'💫扩散',0xddddff); }
              }
            }
          }
          if(t.gen.chain){
            let cSrc=nearest, cDmg=troopDmg*0.6; const hit=new Set([nearest]);
            for(let c=0;c<t.gen.chain;c++){
              let cn=null, cnd=Infinity;
              for(const ce of enemies){ if(hit.has(ce))continue; const cd=Math.sqrt((ce.x-cSrc.x)**2+(ce.y-cSrc.y)**2); if(cd<cnd){cnd=cd;cn=ce;} }
              if(!cn) break; hit.add(cn); cn.hp-=cDmg;
              trackDmg(t.srcKey, t.srcName, cDmg);
              spawnFloat(cn.x,cn.y-10,Math.round(cDmg)+'',0xff6a00);
              const ni=enemies.indexOf(cn);
              if(cn.hp<=0&&ni>=0){spawnFloat(cn.x,cn.y-12,'连锁',0xff6a00);removeEnemy(ni);}else if(cn.hp>0){updateEnemyHP(cn);}
              cSrc=cn; cDmg*=0.6;
            }
          }
        } // end if(t.gen)
        // 张飞·爆裂震地：genKey判断（修复Lv1-3亲兵无AOE bug）——全级别亲兵触发，霸王怒→2圈
        if(t.genKey==='zhangfei'){
          const ringN=globalBuffs.aoeRadiusMul_zhangfei?2:1;
          const aoeDmg=troopDmg*0.9;
          const hc=pixelToHexCenter(nearest.x,nearest.y);
          const _ag=new PIXI.Graphics(); projC.addChild(_ag);
          for(const o of hexDiskOffsets(ringN)){
            _ag.beginFill(0xff5533,0.26); _ag.drawPolygon(hexPoly(hc.x+o.dx, hc.y+o.dy, HEX_SIZE-2)); _ag.endFill();
            _ag.lineStyle(2,0xff7744,0.85); _ag.drawPolygon(hexPoly(hc.x+o.dx, hc.y+o.dy, HEX_SIZE-2)); _ag.lineStyle(0);
          }
          addFadeAnim(projC, _ag, 300);
          for(let j=enemies.length-1;j>=0;j--){
            const ae=enemies[j]; if(ae===nearest) continue;
            if(hexDistance(nearest.x,nearest.y,ae.x,ae.y) > ringN) continue;
            ae.hp-=aoeDmg; spawnFloat(ae.x,ae.y-10,Math.round(aoeDmg)+'',0xff5a5a);
            trackDmg(t.srcKey, t.srcName, aoeDmg);
            if(globalBuffs.aoeBurn_zhangfei){
              ae.zhangfeiBurnUntil=tnow+2000; ae._burnDmg=aoeDmg*0.3; ae._burnTimer=0;
            }
            if(ae.hp<=0){spawnFloat(ae.x,ae.y-12,'溅杀',0xff5a5a);removeEnemy(j);}else{updateEnemyHP(ae);}
          }
        }
        // 吕布铁骑冲阵：独立3s CD（约每7.5次普攻触发一次），不与普攻频率绑定
        t._chargeCd=(t._chargeCd||0)+troopAtkInterval;
        if(((t.gen && t.gen.charge) || t.charge) && t._chargeCd>=3000){ t._chargeCd=0;
            const chgDx=nearest.x-t.x, chgDy=nearest.y-t.y;
            const chgLen=Math.sqrt(chgDx*chgDx+chgDy*chgDy)||1;
            const chgNX=chgDx/chgLen, chgNY=chgDy/chgLen;
            const pierceW=HEX_SIZE*(globalBuffs.chargeWidthMul_lubu||1);
            const pierceDmg=troopDmg*0.85*(globalBuffs.chargeDmgMul_lubu||1);
            // 冲阵光迹：中轴 + 两侧余韵
            const chgGfx=new PIXI.Graphics(); projC.addChild(chgGfx);
            chgGfx.lineStyle(3,0xff6633,0.95);
            chgGfx.moveTo(t.x-chgNX*HEX_SIZE,t.y-chgNY*HEX_SIZE);
            chgGfx.lineTo(t.x+chgNX*(chgLen+HEX_SIZE*2),t.y+chgNY*(chgLen+HEX_SIZE*2));
            chgGfx.lineStyle(1.5,0xffaa66,0.5);
            chgGfx.moveTo(t.x-chgNX*HEX_SIZE+chgNY*7,t.y-chgNY*HEX_SIZE-chgNX*7);
            chgGfx.lineTo(t.x+chgNX*(chgLen+HEX_SIZE)+chgNY*7,t.y+chgNY*(chgLen+HEX_SIZE)-chgNX*7);
            chgGfx.moveTo(t.x-chgNX*HEX_SIZE-chgNY*7,t.y-chgNY*HEX_SIZE+chgNX*7);
            chgGfx.lineTo(t.x+chgNX*(chgLen+HEX_SIZE)-chgNY*7,t.y+chgNY*(chgLen+HEX_SIZE)+chgNX*7);
            addFadeAnim(projC, chgGfx, 220);
            for(let j=enemies.length-1;j>=0;j--){
              const pe=enemies[j]; if(pe===nearest) continue;
              const ex=pe.x-t.x, ey=pe.y-t.y;
              const cross=Math.abs(ex*(chgDy/chgLen)-ey*(chgDx/chgLen));
              const dot=ex*(chgDx/chgLen)+ey*(chgDy/chgLen);
              if(cross<pierceW && dot>0 && dot<chgLen+HEX_SIZE*2){
                pe.hp-=pierceDmg; spawnFloat(pe.x,pe.y-10,Math.round(pierceDmg)+'',0xff6633);
                trackDmg(t.srcKey,t.srcName,pierceDmg);
                if(globalBuffs.chargeKnockback_lubu && !pe.isBoss){
                  pe.x+=chgNX*HEX_SIZE*0.8; pe.y+=Math.min(chgNY,0)*HEX_SIZE*0.8;
                  if(pe.cont){ pe.cont.x=pe.x; pe.cont.y=pe.y; }
                }
                // 穿透命中：点亮所在六边形单元格
                const hc=pixelToHexCenter(pe.x,pe.y);
                const impG=new PIXI.Graphics(); impG.x=hc.x; impG.y=hc.y; projC.addChild(impG);
                impG.beginFill(0xff6633,0.28); impG.drawPolygon(hexCorners(HEX_SIZE-2)); impG.endFill();
                impG.lineStyle(2.5,0xff8844,0.95); impG.drawPolygon(hexCorners(HEX_SIZE-2));
                addFadeAnim(projC, impG, 240);
                if(pe.hp<=0){spawnFloat(pe.x,pe.y-12,'冲阵',0xff8800);removeEnemy(j);}else{updateEnemyHP(pe);}
              }
            }
          }
        const nei=enemies.indexOf(nearest);
        if(nearest.hp<=0){
          interceptCount++;
          if(nei>=0){spawnFloat(nearest.x,nearest.y-12,t.gen?'★'+t.gen.name:'击破',0x8b6200);removeEnemy(nei);}
          // 甘宁「奇袭」：击杀后对最近另一目标造成50%伤害
          if(globalBuffs.ganningChain && t.gen && t.gen.key==='ganning' && enemies.length>0){
            let chainTgt=null, chainD=Infinity;
            for(const ce of enemies){ const cd=Math.sqrt((ce.x-t.x)**2+(ce.y-t.y)**2); if(cd<chainD){chainD=cd;chainTgt=ce;} }
            if(chainTgt){ chainTgt.hp-=troopDmg*0.5; spawnFloat(chainTgt.x,chainTgt.y-14,'奇袭！',0xffaa00);
              const ci=enemies.indexOf(chainTgt); if(chainTgt.hp<=0&&ci>=0){removeEnemy(ci);}else if(chainTgt.hp>0){updateEnemyHP(chainTgt);} }
          }
        } else {
          updateEnemyHP(nearest);
          t.hp-=nearest.maxHp*0.06; updateTroopHP(t);
          // 曹仁反伤：亲兵受近战攻击时反弹伤害给攻击者
          if(t.reflect > 0 && !nearest.isBoss){
            const rfDmg = Math.ceil(nearest.maxHp * 0.06 * t.reflect);
            nearest.hp -= rfDmg;
            spawnFloat(nearest.x, nearest.y-8, '↩'+rfDmg, 0xffaa44);
            const rfi=enemies.indexOf(nearest);
            if(nearest.hp<=0 && rfi>=0){ spawnFloat(nearest.x,nearest.y-12,'反伤击杀',0xffaa44); removeEnemy(rfi); }
            else if(nearest.hp>0) updateEnemyHP(nearest);
          }
          if(t.hp<=0){
            // 典韦亲兵阵亡：在原格留下火海（殉燃词条可强化）
            if(t.genKey==='dianwei'){
              const burnDps=(B_TYPES.find(b=>b.key==='advance')||{dps:6}).dps*3;
              const fzQ=Math.round((t.x-cx)/HEX_COL), fzR2=Math.round((t.y-cy)/HEX_ROW-fzQ*0.5);
              const fzX=HEX_COL*fzQ+cx, fzY=HEX_ROW*(fzR2+fzQ*0.5)+cy;
              const fzLife = globalBuffs.deathFireBoost_dianwei ? 10000 : 5000;
              const fzSlow = globalBuffs.deathFireBoost_dianwei ? 0.4 : 0.6;
              const fzGfx=new PIXI.Graphics(); fzGfx.x=fzX; fzGfx.y=fzY; projC.addChild(fzGfx);
              fireZones.push({ x:fzX, y:fzY, r:HEX_SIZE, life:fzLife, maxLife:fzLife, gfx:fzGfx, dps:burnDps*0.4, slowFactor:fzSlow });
            }
            if(t.isGeneralTroop){
              t.sourceCell.generalOut=false;
              t.sourceCell.generalRespawnTimer=5000;
              spawnFloat(t.x,t.y-14,'战死！',0x8b6200);
            } else {
              spawnFloat(t.x,t.y-10,'阵亡',0xff5a5a);
            }
            removeTroop(i); continue;
          }
        }
      }
    }
  }

  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i]; p.life--;
    const t2=1-p.life/p.maxLife;
    p.cont.x=p.sx+(p.tx-p.sx)*t2; p.cont.y=p.sy+(p.ty-p.sy)*t2;
    p.cont.alpha=1-t2*0.6;
    if(p.fixedRotation!==undefined) p.cont.rotation=p.fixedRotation;
    if(p.life<=0){ projC.removeChild(p.cont); projectiles.splice(i,1); }
  }

  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.y-=0.6; f.life--; f.alpha=Math.min(1,f.life/Math.min(16,(f._maxLife||30)*0.4));
    if(f.life<=0){ floatC.removeChild(f); floats.splice(i,1); }
  }

  // 引导脉冲动画
  if(guideStep < 2){
    const pa=0.3+0.3*Math.sin(performance.now()/700);
    for(const c of hexCells){
      const isPulse=(guideStep===0 && c.state==='flippable')||
        (guideStep===1 && c.state==='revealed' && c.lvl<TUNE.maxLvl &&
          hexCells.some(o=>o!==c&&o.state==='revealed'&&o.lvl===c.lvl&&o.building===c.building&&o.lvl<TUNE.maxLvl));
      if(isPulse){
        if(!c.guidePulse){ c.guidePulse=new PIXI.Graphics(); c.cont.addChild(c.guidePulse); }
        c.guidePulse.clear();
        c.guidePulse.lineStyle(2.5,guideStep===0?0x1133aa:0x8b6200,pa);
        c.guidePulse.drawPolygon(hexCorners(HEX_SIZE+4));
      } else if(c.guidePulse){ c.cont.removeChild(c.guidePulse); c.guidePulse=null; }
    }
  }
}

// 统一 troop 记录工厂：troop 字段表的唯一来源，杜绝字段在三个 spawn 函数间漂移
// （genKey 缺失导致张飞/典韦/低级关羽签名效果实战静默；dmgType 缺失导致低级亲兵物法克制按"物理"误算）。
// 各 spawn 仍自建容器与各自的 hp/size/出生点，仅把运行时字段经 p 传入；恒定派生字段在此集中计算。
function pushTroop(cell, cont, hpFill, p){
  const gen = cell.general;
  const troop = {
    x:p.x, y:p.y, homeX:p.x, homeY:p.y,
    hp:p.hp, maxHp:p.hp, dmg:p.dmg, cont, hpFill, size:p.size,
    gen:p.gen||null, genKey:gen?gen.key:null, dmgType:gen?gen.dmgType:'物理',
    bt:B_TYPES.find(b=>b.key===cell.category),
    atkTimer:0, charge:!!(gen&&gen.charge),
    srcKey:cell.building, srcName:gen?gen.name:cell.building,
    moveSpdMul:p.moveSpdMul==null?1:p.moveSpdMul, reflect:p.reflect||0, laneIdx:p.laneIdx,
    isGeneralTroop:!!p.isGeneralTroop, sourceCell:p.sourceCell||null,
    rallying:!!p.rallying, rallyX:p.rallyX, rallyY:p.rallyY,
  };
  updateTroopHP(troop); troops.push(troop); maybeAssignPlayerMiner(troop);
  if(troops.length > peakTroopCount) peakTroopCount = troops.length;
  return troop;
}

function spawnTroop(cell, initialTarget, dmg){
  const bt=B_TYPES.find(b=>b.key===cell.category);
  const gen=cell.general; const isGen=cell.lvl>=TUNE.maxLvl&&gen;
  const dpsMul=isGen?gen.dpsMul:1;
  const hp=bt.dps*meleeScale(cell.lvl)*dpsMul*2.5;
  const size=isGen?(gen.projSize||6):5;
  // 从城外生成，不在建筑格内出现
  const _cqT=Math.round((cell.px - cx) / HEX_COL);
  const laneIdx=_cqT < 0 ? 0 : _cqT > 0 ? 2 : 1;
  const spawnX=LANES[laneIdx]+(Math.random()-0.5)*18;
  const spawnY=TROOP_Y_FLOOR - HEX_SIZE*0.5;
  const cont=new PIXI.Container();
  const body=new PIXI.Graphics(); body.beginFill(isGen?0x8b6200:bt.hex); body.drawCircle(0,0,size); body.endFill(); cont.addChild(body);
  if(cell.general){ const iconGfx=new PIXI.Graphics(); drawWeaponIcon(iconGfx,cell.general.key,size); cont.addChild(iconGfx); }
  const hpBg=new PIXI.Graphics(); hpBg.beginFill(0x222); hpBg.drawRect(-8,-size-6,16,3); hpBg.endFill(); cont.addChild(hpBg);
  const hpFill=new PIXI.Graphics(); cont.addChild(hpFill);
  cont.x=spawnX; cont.y=spawnY; projC.addChild(cont);
  pushTroop(cell, cont, hpFill, { x:spawnX, y:spawnY, hp, dmg, size, laneIdx,

    moveSpdMul:cell.general?(cell.general.spdMul||1):1,

}

function updateTroopHP(t){
  const pct=Math.max(0,t.hp/t.maxHp);
  t.hpFill.clear(); t.hpFill.beginFill(0x44ff88); t.hpFill.drawRect(-8,-t.size-6,16*pct,3); t.hpFill.endFill();
}

// 关羽·基础剑气：普通亲兵3000ms出一次，穿1格（义绝→2格），轻量刀光
function fireGuanyuBasicSlash(t, target, dmg){
  const cur=pixelToAxial(t.x,t.y);
  const gdx=target.x-t.x, gdy=target.y-t.y, gl=Math.hypot(gdx,gdy)||1;
  let bestDir=HEX_DIRS[0], bestScore=-Infinity;
  for(const [dq,dr] of HEX_DIRS){
    const np=hexToPixel(cur.q+dq,cur.r+dr,cx,cy);
    const ndx=np.x-t.x, ndy=np.y-t.y, nl=Math.hypot(ndx,ndy)||1;
    const s=(ndx*gdx+ndy*gdy)/(nl*gl);
    if(s>bestScore){ bestScore=s; bestDir=[dq,dr]; }
  }
  const pierceLen=globalBuffs.troopSplash_guanyu?2:1;
  const startC=hexToPixel(cur.q,cur.r,cx,cy);
  const cells=[]; for(let k=1;k<=pierceLen;k++) cells.push(hexToPixel(cur.q+bestDir[0]*k, cur.r+bestDir[1]*k, cx, cy));
  const last=cells[cells.length-1];
  const wg=new PIXI.Graphics(); projC.addChild(wg);
  wg.lineStyle(4,0x99eeff,0.8); wg.moveTo(startC.x,startC.y); wg.lineTo(last.x,last.y);
  addFadeAnim(projC, wg, 220, (et,alpha)=>{ wg.alpha=alpha; });
  for(const c of cells){
    for(let j=enemies.length-1;j>=0;j--){
      const pe=enemies[j];
      if(sameHexCell(pe.x,pe.y,c.x,c.y)){
        const _sd=resDmg(dmg,'物理',pe.armType); pe.hp-=_sd; trackDmg(t.srcKey,t.srcName,_sd);
        spawnFloat(pe.x,pe.y-10,Math.round(_sd)+'',0x99eeff);
        if(pe.hp<=0){spawnFloat(pe.x,pe.y-12,'剑气',0x99eeff);removeEnemy(j);}else updateEnemyHP(pe);
      }
    }
  }
}

// 武器图标：根据武将 key 在小兵圆圈内绘制简单几何武器形状
function drawWeaponIcon(g, genKey, sz){
  const h = Math.max(Math.floor(sz * 0.75), 3);
  const lw = Math.max(1, Math.round(sz * 0.22));

    g.moveTo(h*0.3,-h*0.7); g.lineTo(-h*0.1,-h*0.3);

    g.moveTo(-h*0.4,-h*0.2); g.lineTo(0,-h); g.lineTo(h*0.4,-h*0.2);
  } else if(genKey==='zhaoyun'){ // 龙胆亮银枪：竖线+窄V形头
    g.moveTo(0,h); g.lineTo(0,-h*0.5);
    g.moveTo(-h*0.2,-h*0.3); g.lineTo(0,-h); g.lineTo(h*0.2,-h*0.3);

  } else if(genKey==='dianwei'){ // 单边手戟：T形+右侧延伸
    g.moveTo(0,h); g.lineTo(0,-h*0.2);
    g.moveTo(-h*0.5,-h*0.2); g.lineTo(h*0.5,-h*0.2);
    g.moveTo(h*0.4,-h*0.2); g.lineTo(h*0.4,-h*0.7);

  }
}

// 关羽·青龙斩：沿六边形六方向之一(朝目标)格对齐穿透3格（义绝→5格），逐格命中
function fireGuanyuWave(t, target, dmg){
  const cur=pixelToAxial(t.x,t.y);
  const gdx=target.x-t.x, gdy=target.y-t.y, gl=Math.hypot(gdx,gdy)||1;
  // 选最朝目标的六方向
  let bestDir=HEX_DIRS[0], bestScore=-Infinity;
  for(const [dq,dr] of HEX_DIRS){
    const np=hexToPixel(cur.q+dq,cur.r+dr,cx,cy);
    const ndx=np.x-t.x, ndy=np.y-t.y, nl=Math.hypot(ndx,ndy)||1;
    const s=(ndx*gdx+ndy*gdy)/(nl*gl);
    if(s>bestScore){ bestScore=s; bestDir=[dq,dr]; }
  }
  const pierceLen=globalBuffs.troopSplash_guanyu?3:2;   // 义绝→穿透3格
  const startC=hexToPixel(cur.q,cur.r,cx,cy);
  const cells=[]; for(let k=1;k<=pierceLen;k++) cells.push(hexToPixel(cur.q+bestDir[0]*k, cur.r+bestDir[1]*k, cx, cy));
  const last=cells[cells.length-1];
  const flashes=[];
  // 刀光主线
  const wg=new PIXI.Graphics(); projC.addChild(wg); flashes.push(wg);
  wg.lineStyle(7,0x88eeff,0.95); wg.moveTo(startC.x,startC.y); wg.lineTo(last.x,last.y);
  wg.lineStyle(3,0xffffff,0.95); wg.moveTo(startC.x,startC.y); wg.lineTo(last.x,last.y);
  // 逐格高亮 + 命中该格内所有敌人
  for(const c of cells){
    const cg=new PIXI.Graphics(); cg.x=c.x; cg.y=c.y; projC.addChild(cg); flashes.push(cg);
    cg.beginFill(0x88eeff,0.30); cg.drawPolygon(hexCorners(HEX_SIZE-2)); cg.endFill();
    cg.lineStyle(2.5,0xcceeff,0.95); cg.drawPolygon(hexCorners(HEX_SIZE-2));
    for(let j=enemies.length-1;j>=0;j--){
      const pe=enemies[j];
      if(sameHexCell(pe.x,pe.y,c.x,c.y)){
        const _wd=resDmg(dmg,'物理',pe.armType); pe.hp-=_wd; trackDmg(t.srcKey,t.srcName,_wd);
        spawnFloat(pe.x,pe.y-10,Math.round(_wd)+'',0x88eeff);
        if(pe.hp<=0){spawnFloat(pe.x,pe.y-12,'青龙斩',0x88eeff);removeEnemy(j);}else updateEnemyHP(pe);
      }
    }
  }
  // 释放闪光
  const flash=new PIXI.Graphics(); flash.x=t.x; flash.y=t.y; projC.addChild(flash); flashes.push(flash);
  flash.beginFill(0xccffff,0.8); flash.drawCircle(0,0,t.size+6); flash.endFill();
  spawnFloat(t.x,t.y-20,'⚔青龙斩',0x88eeff,{fontSize:15,life:40});
  addFadeAnim(projC, flashes, 450, elapsed => flash.scale.set(1 + elapsed/120));
}

function addFadeAnim(container, gfx, durationMs, onTick) {
  const targets = Array.isArray(gfx) ? gfx : [gfx];
  const startTime = performance.now();
  const step = () => {
    const t = performance.now() - startTime;
    const a = Math.max(0, 1 - t / durationMs);
    for (const g of targets) g.alpha = a;
    if (onTick) onTick(t, a);
    if (t < durationMs) requestAnimationFrame(step);
    else for (const g of targets) { if (container.children.indexOf(g) >= 0) container.removeChild(g); }
  };
  requestAnimationFrame(step);
}

function spawnArrowProjectile(sx,sy,tx,ty,hex,size=4,maxLife=18){
  const ang=Math.atan2(ty-sy,tx-sx);
  const L=size*3.5, W=size*0.8, hd=size*1.3;

  cont.beginFill(hex);
  cont.moveTo(-L/2,-W/2);

  cont.lineTo(L/2-hd,W); cont.lineTo(L/2-hd,W/2);

  cont.x=sx; cont.y=sy; cont.rotation=ang;
  projC.addChild(cont);
  projectiles.push({sx,sy,tx,ty,cont,life:maxLife,maxLife,fixedRotation:ang});

function buildWarReport(isWin, failedWave){
  const elapsed = battleStartTime > 0 ? (performance.now() - battleStartTime) / 1000 : 1;

// 过水绕行目标：目标在中线对岸或自身已在水域带时，改走左右绕行车道
function pvpDetourGoal(t, gx, gy){
  if(!PVP_MODE) return { x: gx, y: gy };
  const goalAcross = (t.y - midlineY) * (gy - midlineY) < 0;      // 目标在中线对岸
  const selfInBand = Math.abs(t.y - midlineY) < HEX_ROW * 3.3;    // 自身已在水域带
  if(!goalAcross && !selfInBand){ t._bypassSide = undefined; return { x: gx, y: gy }; }   // 离开水域带→清除绕行侧记忆，再入按当时所在侧重算（防越线后仍按旧侧绕行的振荡）
  let side;
  if(Math.abs(gx - cx) > HEX_COL){ side = gx >= cx ? 1 : -1; }    // 目标偏一侧→走该侧车道直达
  else { if(t._bypassSide === undefined) t._bypassSide = (t.x <= cx ? -1 : 1); side = t._bypassSide; } // 目标居中→分摊
  return { x: cx + side * HEX_COL * 2.5, y: gy };
}

// ===== 金矿资源点（PvP 经济：镜像对称 + 左右错位，占领产金） =====
function drawGoldMine(m){
  m.cont.removeChildren();
  const col = m.owner==='player' ? 0x4a8c30 : m.owner==='enemy' ? 0xc0503a : 0x8b6200;
  const g = new PIXI.Graphics();
  g.beginFill(col, m.owner==='neutral' ? 0.3 : 0.5);
  g.lineStyle(2.5, col, 0.9);
  g.drawPolygon(hexPoly(0, 0, HEX_SIZE - 2)); g.endFill();
  m.cont.addChild(g);
  const t = new PIXI.Text('矿', {fontSize:16, fill:'#7a5810', fontWeight:'900', stroke:'#f7efda', strokeThickness:3});
  t.anchor.set(0.5); t.y = -4; m.cont.addChild(t);
  const inc = new PIXI.Text('+'+MINE_INCOME, {fontSize:10, fill:'#8b6200', fontWeight:'700', stroke:'#f7efda', strokeThickness:2});
  inc.anchor.set(0.5); inc.y = 11; m.cont.addChild(inc);
}
function buildGoldMines(){
  goldMines = [];
  // 5 矿全部初始中立，双方靠采矿兵寻路抢占。近矿在各自后角(需绕远)，中线一对+中心=争夺。
  const LX = cx - HEX_COL * 2.5;     // 左路：贴中线争夺
  const RX = cx + HEX_COL * 3.3;     // 右后角：近矿
  const CX5 = cx + HEX_COL * 2;       // 中心偏右
  const defs = [
    { x: RX,  y: cy        - HEX_ROW * 0.5, owner: 'neutral' }, // M1 玩家·右下后角（近矿）
    { x: RX,  y: enemyCy   + HEX_ROW * 0.5, owner: 'neutral' }, // M2 敌方·右上后角（镜像近矿）
    { x: LX,  y: midlineY  + HEX_ROW * 3,   owner: 'neutral' }, // M3 左路·玩家侧贴中线（争夺）
    { x: LX,  y: midlineY  - HEX_ROW * 3,   owner: 'neutral' }, // M4 左路·敌方侧贴中线（镜像争夺）
    { x: CX5, y: midlineY,                  owner: 'neutral' }, // M5 中心偏右贴中线（中段争夺）
  ];
  for(const def of defs){
    const a = pixelToAxial(def.x, def.y);
    const p = hexToPixel(a.q, a.r, cx, cy);
    const cont = new PIXI.Container(); cont.x = p.x; cont.y = p.y;
    worldC.addChild(cont);
    const m = { q: a.q, r: a.r, px: p.x, py: p.y, owner: def.owner, cont, incomeTimer: 0 };
    goldMines.push(m); drawGoldMine(m);
  }
}

// 玩家采矿派遣：保持最多 PLAYER_MINER_CAP 个亲兵奔向最近的「非己方」矿。新生成亲兵时调用。
const PLAYER_MINER_CAP = 2;
function maybeAssignPlayerMiner(t){
  if(!PVP_MODE || !t) return;
  if(t.isGeneralTroop) return;                  // 满级武将/大将不挪去采矿，保留其进攻目标(initialTarget)；非满级集结亲兵仍可采矿
  let cur = 0;
  for(const x of troops) if(x.mineTarget) cur++;
  if(cur >= PLAYER_MINER_CAP) return;
  let best=null, bd=Infinity;
  for(const m of goldMines){
    if(m.owner==='player') continue;            // 只抢非己方（中立/敌方）矿
    const d=Math.hypot(m.px - t.x, m.py - t.y);
    if(d < bd){ bd=d; best=m; }
  }
  if(best) t.mineTarget = best;
}

// 敌方簇视觉镜像（关于中线反射玩家 16 格布局 + 敌基标记）。仅视觉，绝不写 hexCells。
function drawEnemyClusterOutline(){
  if(enemyClusterGfx){ enemyClusterGfx.destroy(); enemyClusterGfx=null; }
  if(enemyBuildC){ enemyBuildC.destroy({children:true}); enemyBuildC=null; }  // 重建以保持在簇轮廓之上
  const g = new PIXI.Graphics();
  const cells = [[0,0,'base'],
    ...RING1_CELLS.map(c=>[c[0],c[1],'r1']),
    ...RING2_CELLS.map(c=>[c[0],c[1],'r2'])];
  enemyClusterCells = [];
  for(const [q,r,k] of cells){
    const ex = cx + q * HEX_COL;
    const ey = enemyCy - HEX_ROW * (r + q*0.5);   // 关于中线镜像：朝中线向下铺展
    enemyClusterCells.push({ ex, ey, k });
    g.lineStyle(1.5, 0x7a2820, 0.85);
    g.beginFill(k==='base'?0xc0503a:0xcc7060, k==='base'?0.5:0.2);
    g.drawPolygon(hexPoly(ex, ey, HEX_SIZE-2));
    g.endFill();
  }
  g.lineStyle(0); g.beginFill(0x7a2820, 0.95);
  g.drawCircle(cx, enemyCy, 11); g.endFill();
  enemyClusterGfx = g;
  bgHexC.addChild(g);
