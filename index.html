}

// 敌方"已建"格可视层：把前 aiFlips 个簇格(base 除外)画成红色建筑块+武将武器图标。
function updateEnemyBuildVisual(){
  if(!PVP_MODE) return;
  if(!enemyBuildC){ enemyBuildC = new PIXI.Container(); bgHexC.addChild(enemyBuildC); }
  const buildable = enemyClusterCells.filter(c=>c.k!=='base');
  const n = Math.min(aiFlips, buildable.length);
  for(let i=enemyBuildC.children.length; i<n; i++){
    const sub = new PIXI.Container();
    const hexG = new PIXI.Graphics(); sub.addChild(hexG);
    const icon = new PIXI.Graphics(); sub.addChild(icon);
    sub._hexG = hexG; sub._icon = icon;
    enemyBuildC.addChild(sub);
  }
  for(let i=0;i<enemyBuildC.children.length;i++){
    const sub = enemyBuildC.children[i];
    if(i < n){
      sub.visible = true;
      const c = buildable[i];
      sub.x = c.ex; sub.y = c.ey;
      sub._hexG.clear();
      sub._hexG.lineStyle(2, 0xff5544, 0.9);
      sub._hexG.beginFill(0xc0503a, 0.62);
      sub._hexG.drawPolygon(hexPoly(0, 0, HEX_SIZE-3));
      sub._hexG.endFill();
      sub._icon.clear();
      drawWeaponIcon(sub._icon, ENEMY_BUILD_GENS[i % ENEMY_BUILD_GENS.length], HEX_SIZE*0.55);
    } else sub.visible = false;
  }
}

// AI 翻格决策：攒够下一格价格即翻，金币唯一去向=推高 aiLvl 滚雪球
function aiTryFlip(){
  if(gameOver || aiFlips >= FLIP_PRICES.length) return; // 翻格上限
  const cost = FLIP_PRICES[aiFlips];
  if(enemyGold < cost) return;                          // 攒钱不够，等下次决策
  enemyGold -= cost;
  aiFlips++;
  updateEnemyBuildVisual();   // 翻格即点亮敌方"已建"格
  const upDone = aiLvl - 1;                             // 升级判定：与玩家同阈值 UPGRADE_FLIPS
  if(upDone < UPGRADE_FLIPS.length && aiFlips >= UPGRADE_FLIPS[upDone]){
    aiLvl++;
    spawnFloat(cx, midlineY - 40, '⚠ 敌方升至 Lv'+aiLvl, 0xff5544, {life:90, fontSize:15});
    blip(180, 0.18, 'sawtooth', 0.16);
  }
}

function pvpSpawnEnemyWave(){
  if(gameOver || gameWon) return;
  // 产兵 = AI 建筑被动军事产出（免费，gold 全用于翻格滚雪球），强度随 aiLvl 缩放
  const pvpEnemyOnField = enemies.filter(e=>e.isPvpTroop).length;
  const onFieldCap = Math.max(4, aiFlips * 2);                  // 在场上限镜像 AI 自身翻格数（早期保底4）
  if(pvpEnemyOnField >= onFieldCap) return;
  waveCount++;
  const waveHp   = Math.round(50 * Math.pow(1.5, aiLvl - 1) * (1 + aiFlips * 0.03));
  const count    = Math.min(2 + Math.floor(aiFlips / 4), 5);    // 最多5个/波
  const waveSpd  = 0.22 + Math.min(aiLvl*0.02, 0.12);
  for(let i=0; i<count; i++){
    // 绕行道路出兵：左右交替（q=±2.5），避开水域
    const bypassDir = i % 2 === 0 ? 1 : -1;
    const bypassLaneX = cx + bypassDir * HEX_COL * 2.5;
    const spawnX = bypassLaneX + (Math.random()-0.5)*HEX_SIZE;
    const spawnY = enemyCy + HEX_ROW * 1.8;          // 敌方基地下方出兵
    const spd    = waveSpd + Math.random()*0.06;
    const e = { x:spawnX, y:spawnY, hp:waveHp, maxHp:waveHp, speed:spd,
      laneX:bypassLaneX, waveType:'pvp', noAttack:false, size:8, isPvpTroop:true };
    if(i === 0){
      let best = null, bd = Infinity;
      for(const gm of goldMines){
        if(gm.owner === 'enemy') continue;                 // 已是己方矿不抢
        const gd = Math.hypot(gm.px - spawnX, gm.py - spawnY);
        if(gd < bd){ bd = gd; best = gm; }
      }
      if(best) e.mineTarget = best;
    }
    const cont=new PIXI.Container(); cont.x=spawnX; cont.y=spawnY;
    const body=new PIXI.Graphics();
    body.beginFill(0x991111); body.lineStyle(1.5,0xff4433,0.9); body.drawCircle(0,0,8); body.endFill();
    cont.addChild(body);
    const wic=new PIXI.Graphics(); drawWeaponIcon(wic, ENEMY_BUILD_GENS[(waveCount + i) % ENEMY_BUILD_GENS.length], 8); cont.addChild(wic);
    const hpBg=new PIXI.Graphics(); hpBg.beginFill(0x222); hpBg.drawRect(-8,-12,16,3); hpBg.endFill(); cont.addChild(hpBg);
    const hpFill=new PIXI.Graphics(); cont.addChild(hpFill);
    const statusRing=new PIXI.Graphics(); cont.addChild(statusRing); e.statusRing=statusRing;   // 减速/嘲讽/中毒状态环（与 spawnGroup 一致，否则 PvP 敌兵无状态视觉反馈）
    e.hpFill=hpFill; e.cont=cont;
    updateEnemyHP(e);
    enemyC.addChild(cont);
    enemies.push(e);
  }
}

// PvP 拆基地：玩家攻破敌方基地
function pvpWin(){ pvpEndMatch('player', '基地'); }

// PvP 时限到点：比占领度，多者胜、相等平局
function pvpTimeoutResolve(){
  if(gameOver || pvpMatchEnded) return;
  let pTerr=0, eTerr=0;
  for(const s of pvpTerritory.values()){ if(s==='player') pTerr++; else eTerr++; }
  const winner = pTerr > eTerr ? 'player' : (eTerr > pTerr ? 'enemy' : 'draw');
  pvpEndMatch(winner, '占领度');
}

// PvP 统一结算：winner ∈ {player,enemy,draw}，reason ∈ {基地,占领度}
function pvpEndMatch(winner, reason){
  if(gameOver || pvpMatchEnded) return;
  pvpMatchEnded = true; gameOver = true; gameWon = (winner === 'player');
  let pTerr=0, eTerr=0;
  for(const s of pvpTerritory.values()){ if(s==='player') pTerr++; else eTerr++; }
  const elapsed = battleStartTime>0 ? Math.round((performance.now()-battleStartTime)/1000) : 0;
  const timeStr = Math.floor(elapsed/60)+':'+String(elapsed%60).padStart(2,'0');
  let titleTxt, titleColor, subTxt;
  if(winner==='player'){
    titleTxt='🎉 胜利'; titleColor='#4aff8a';
    subTxt = reason==='基地' ? '攻破敌方基地 · 拆家制胜' : '占领度领先 · 时限制胜';
    shake=22; burstSound(6);
    spawnFloat(cx, midlineY, reason==='基地'?'⚔ 敌方基地陷落！':'⏱ 占领度胜出！', 0x8b6200, {life:200, fontSize:18});
  } else if(winner==='enemy'){
    titleTxt='✖ 失败'; titleColor='#ff5555';
    subTxt = reason==='基地' ? '我方基地陷落 · 守家失败' : '占领度落后 · 时限告负';
    shake=18;
  } else {
    titleTxt='⚖ 平局'; titleColor='#e8d8b8';
    subTxt = '时限到 · 双方占领度持平';
  }
  const delay = (winner==='player' && reason==='基地') ? 1000 : 400;
  setTimeout(()=>{
    const el=document.getElementById('winStats');
    if(el){
      const R = (n,v,c)=>`<div class="ws-row"><div class="ws-name">${n}</div><div class="ws-nums"${c?` style="color:${c}"`:''}>${v}</div></div>`;
      const terrColor = pTerr>eTerr ? '#4aff8a' : (eTerr>pTerr ? '#ff5555' : '#e8d8b8');
      el.innerHTML =
        `<div class="ws-title">PvP 战报</div>`
        + R('胜负', reason==='基地'?'拆基地':'占领度（时限）', titleColor)
        + R('占地（格）', `我 ${pTerr} : ${eTerr} 敌`, terrColor)
        + R('敌方基地', Math.max(0,Math.round(enemyBaseHP))+' / '+enemyBaseMaxHP)
        + R('我方城墙', Math.max(0,Math.round(baseHP))+' / '+maxHP)
        + R('时长', timeStr)
        + R('波次', waveCount+' 波');
    }
    const winTextEl=document.querySelector('#winOverlay .win-text'); if(winTextEl){ winTextEl.textContent=titleTxt; winTextEl.style.color=titleColor; }
    const subEl=document.querySelector('#winOverlay .win-sub'); if(subEl){ subEl.textContent=subTxt; subEl.style.color=titleColor; }
    const diffEl=document.getElementById('difficultyEl'); if(diffEl) diffEl.textContent=difficulty;
    const nextBtn=document.getElementById('btnNextDiff'); if(nextBtn) nextBtn.style.display='none'; // PvP 无难度阶梯
    const reBtn=document.getElementById('btnRestart3'); if(reBtn) reBtn.textContent='再战一局';
    document.getElementById('winOverlay').style.display='flex';
  }, delay);
}

// PvP 领地占格：单位走到某像素点时，标记该轴坐标为归属方并重绘覆盖层
function pvpOccupyAt(px, py, side){
  const {q, r} = pixelToAxial(px, py);
  const key = q+','+r;
  if(pvpTerritory.get(key) !== side){ pvpTerritory.set(key, side); pvpTerrDirty = true; }
}
function pvpTerrDraw(){
  if(!pvpTerrDirty) return;
  pvpTerrDirty = false;
  if(!pvpTerrGfx){ pvpTerrGfx = new PIXI.Graphics(); bgHexC.addChild(pvpTerrGfx); }
  pvpTerrGfx.clear();
  for(const [key, side] of pvpTerritory){
    const [q, r] = key.split(',').map(Number);
    const px2 = cx + q * HEX_COL;
    const py2 = cy + HEX_ROW * (r + q * 0.5);
    pvpTerrGfx.beginFill(side==='player' ? 0x4a8c30 : 0xcc3322, 0.35);
    pvpTerrGfx.drawPolygon(hexPoly(px2, py2, HEX_SIZE - 2));
    pvpTerrGfx.endFill();
  }
}

boot();
